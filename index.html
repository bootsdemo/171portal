<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>171 Alliance Command Portal</title>
    <!-- Load Supabase CDN Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #12161a;
            --panel-bg: #1a2229;
            --border-color: #2e3b4e;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-orange: #ff7b00;
            --accent-green: #10b981;
            --accent-red: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 15px; font-size: 14px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; padding: 15px; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; position: relative; }
        h1 { color: var(--accent-orange); font-size: 1.5rem; margin-bottom: 5px; }
        .logout-btn { position: absolute; top: 15px; right: 15px; background: #2e3b4e; color: var(--text-main); border: 1px solid var(--border-color); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .logout-btn:hover { border-color: var(--accent-orange); color: var(--accent-orange); }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-bottom: 20px; }
        .panel-title { font-size: 1.1rem; color: var(--accent-orange); margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .profile-card { background: #151b20; border-radius: 6px; padding: 15px; margin-bottom: 10px; border: 1px solid #232d37; }
        .profile-meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .meta-display-item { font-size: 14px; color: var(--text-main); }
        .meta-display-item span { color: var(--text-muted); font-size: 12px; display: block; text-transform: uppercase; margin-bottom: 2px; }
        .meta-display-item strong { color: var(--accent-orange); font-size: 15px; }
        .event-container { border: 2px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 30px; background: #151b20; }
        .event-container-title { color: var(--accent-orange); font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid var(--accent-orange); display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 10px; background: #0f1317; border: 1px solid var(--border-color); color: white; border-radius: 4px; font-size: 14px; }
        input:disabled, select:disabled { background: #1a2229 !important; color: var(--text-muted) !important; cursor: not-allowed; border-color: #232d37; }
        textarea { height: 80px; resize: none; }
        .btn { background: var(--accent-orange); color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background: #2e3b4e; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-secondary:hover { border-color: var(--accent-orange); color: var(--accent-orange); }
        .toggle-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .toggle-btn { flex: 1; padding: 10px; background: #0f1317; border: 1px solid var(--border-color); color: var(--text-muted); text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .toggle-btn.active { background: var(--accent-orange); color: white; border-color: var(--accent-orange); }
        .hidden { display: none !important; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 8px; background: #0f1317; border: 1px solid var(--border-color); cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .tab.active { background: #2e3b4e; color: var(--accent-orange); border-color: var(--accent-orange); }
        .checkbox-grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-height: 250px; overflow-y: auto; padding: 15px; background: #0f1317; border: 1px solid var(--border-color); border-radius: 4px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 4px 0; }
        .checkbox-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .summary-bar { background: #232d37; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 12px; border-left: 4px solid var(--accent-orange); }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border-color); }
        th { background: #0f1317; color: var(--text-muted); }
        .badge { padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: bold; background: #2e3b4e; }
        .badge-admin { background: var(--accent-orange); color: white; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>171 ALLIANCE MATRIX</h1>
        <p style="color: var(--text-muted);">Strategic Operations Control Center</p>
        <button id="global-logout-btn" class="logout-btn hidden" onclick="app.logout()">LOG OUT</button>
    </header>

    <!-- LOGIN PANEL -->
    <div id="login-panel" class="panel">
        <div class="panel-title">Verify Player Identity</div>
        <div class="form-group">
            <label for="login-id">Enter In-Game Player ID</label>
            <input type="number" id="login-id" placeholder="e.g., 9482019">
        </div>
        <button class="btn" onclick="app.login()">Access Portal</button>
    </div>

    <!-- MAIN APP WRAPPER (HIDDEN UNTIL LOGIN) -->
    <div id="app-workspace" class="hidden">
        
        <!-- 1. PROFILE SECTION -->
        <div class="panel" id="global-profile-panel">
            <div class="panel-title">🛡️ Your Profile</div>
            
            <div class="profile-card">
                <div class="profile-meta-grid">
                    <div class="meta-display-item">
                        <span>Player ID (Fixed)</span>
                        <strong id="display-player-id">--</strong>
                    </div>
                    <div class="meta-display-item">
                        <span>Player Name</span>
                        <div id="wrapper-player-name">
                            <strong id="display-player-name">--</strong>
                        </div>
                    </div>
                    <div class="meta-display-item">
                        <span>Home Alliance</span>
                        <div id="wrapper-player-alliance">
                            <strong id="display-player-alliance">--</strong>
                        </div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-top: 15px;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>City Level</label>
                        <select id="profile-city" disabled><option value="TG5">TG5</option><option value="TG6">TG6</option><option value="TG7">TG7</option><option value="TG8">TG8</option></select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Infantry Tier</label>
                        <select id="profile-inf" disabled><option value="TG10">TG10</option><option value="TG11">TG11</option></select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Cavalry Tier</label>
                        <select id="profile-cav" disabled><option value="TG10">TG10</option><option value="TG11">TG11</option></select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Archer Tier</label>
                        <select id="profile-arch" disabled><option value="TG10">TG10</option><option value="TG11">TG11</option></select>
                    </div>
                </div>
                
                <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
                    <button id="profile-action-btn" class="btn btn-secondary" style="width: auto; padding: 8px 25px;" onclick="app.toggleProfileEditMode()">Edit Profile</button>
                </div>
            </div>
        </div>

        <!-- 2. ACTIVE OPERATIONS -->
        <div id="active-events-root"></div>

        <!-- 3. ADMIN OPERATIONS Deck -->
        <div class="panel hidden" id="admin-control-cockpit">
            <div class="panel-title">🛰️ R4/R5 Operations Control Deck</div>
            <div class="form-group">
                <label>Operation Codename / Title</label>
                <input type="text" id="adm-title" placeholder="e.g., General Gates Conflict">
            </div>
            <div class="form-group">
                <label>Operation Classification / Type</label>
                <select id="adm-type" onchange="app.handleAdminTemplatePopulate()">
                    <option value="kvk_prep">KvK Prep Phase</option>
                    <option value="kvk_battle">KvK Battle Phase</option>
                    <option value="tyrant">Tyrant Battle Event</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tactical Mission Orders</label>
                <textarea id="adm-strategy" style="height: 100px;"></textarea>
            </div>
            <button class="btn" onclick="app.launchNewOperation()">Deploy New Strategic Operation</button>
        </div>

    </div>
</div>

<script>
const SUPABASE_URL = "https://xuzoznicceskwulsmymq.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1em96bmljY2Vza3d1bHNteW1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NDE0NzQsImV4cCI6MjA5OTQxNzQ3NH0.5YCJ2EzXNGK23Sml7rAOHzY9JX5PZnUrjihDUlZpr8c";

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TIME_SLOTS = ["23.45 utc - 00.15 utc (start of the day)"];
for (let h = 0; h < 24; h++) {
    let sh = String(h).padStart(2, '0');
    TIME_SLOTS.push(`${sh}.15 utc - ${sh}.45 utc`);
    if (h < 23) {
        let nh = String(h + 1).padStart(2, '0');
        TIME_SLOTS.push(`${sh}.45 utc - ${nh}.15 utc`);
    }
}
TIME_SLOTS.push("23.45 utc - 00.15 utc (end of the day)");

class AppConfig {
    constructor() {
        this.currentUser = null;
        this.activeEvents = [];
        this.allPlayers = [];
        this.isEditingProfile = false;
        
        this.eventFormStates = {}; 
        this.eventMatrixTabs = {}; 
        this.eventParticipations = {}; 
    }

    async init() {
        let { data: events } = await _supabase.from('events').select('*').eq('is_active', true).order('created_at', { ascending: false });
        this.activeEvents = events || [];
        
        // Auto-recovery session check if ID exists in local storage
        const savedId = localStorage.getItem('alliance_matrix_player_id');
        if (savedId) {
            document.getElementById('login-id').value = savedId;
            await this.login();
        }
    }

    async login() {
        const idInput = document.getElementById('login-id').value.trim();
        if(!idInput) return alert("Please supply your In-Game ID.");

        let { data: player } = await _supabase.from('players').select('*').eq('player_id', parseInt(idInput)).single();
        if (!player) return alert("Player ID not recognized in system configuration roster.");

        this.currentUser = player;
        localStorage.setItem('alliance_matrix_player_id', idInput);

        document.getElementById('login-panel').classList.add('hidden');
        document.getElementById('global-logout-btn').classList.remove('hidden');
        document.getElementById('app-workspace').classList.remove('hidden');

        this.renderProfileSectionValues();

        if (player.access_level === 'admin') {
            document.getElementById('admin-control-cockpit').classList.remove('hidden');
            let { data: roster } = await _supabase.from('players').select('*');
            this.allPlayers = roster || [];
            this.handleAdminTemplatePopulate();
        }

        // CRITICAL FIX: Explicitly await the retrieval of database history maps BEFORE rendering fields
        await this.refreshGlobalDataMaps();
    }

    logout() {
        this.currentUser = null;
        this.isEditingProfile = false;
        this.eventFormStates = {};
        this.eventMatrixTabs = {};
        this.eventParticipations = {};
        localStorage.removeItem('alliance_matrix_player_id');
        document.getElementById('login-id').value = '';
        document.getElementById('app-workspace').classList.add('hidden');
        document.getElementById('global-logout-btn').classList.add('hidden');
        document.getElementById('login-panel').classList.remove('hidden');
    }

    renderProfileSectionValues() {
        if (!this.currentUser) return;
        
        document.getElementById('display-player-id').innerText = this.currentUser.player_id;
        
        if (!this.isEditingProfile) {
            document.getElementById('wrapper-player-name').innerHTML = `<strong id="display-player-name">${this.currentUser.player_name || '--'}</strong>`;
            document.getElementById('wrapper-player-alliance').innerHTML = `<strong id="display-player-alliance">${this.currentUser.current_alliance || 'Unassigned'}</strong>`;
            
            document.getElementById('profile-city').disabled = true;
            document.getElementById('profile-inf').disabled = true;
            document.getElementById('profile-cav').disabled = true;
            document.getElementById('profile-arch').disabled = true;
            
            document.getElementById('profile-action-btn').innerText = "Edit Profile";
            document.getElementById('profile-action-btn').className = "btn btn-secondary";
        } else {
            document.getElementById('wrapper-player-name').innerHTML = `<input type="text" id="edit-player-name" value="${this.currentUser.player_name || ''}" style="padding:5px 8px; font-size:13px;">`;
            document.getElementById('wrapper-player-alliance').innerHTML = `<input type="text" id="edit-player-alliance" value="${this.currentUser.current_alliance || ''}" placeholder="e.g., Zen" style="padding:5px 8px; font-size:13px;">`;
            
            document.getElementById('profile-city').disabled = false;
            document.getElementById('profile-inf').disabled = false;
            document.getElementById('profile-cav').disabled = false;
            document.getElementById('profile-arch').disabled = false;
            
            document.getElementById('profile-action-btn').innerText = "Save Changes";
            document.getElementById('profile-action-btn').className = "btn";
        }

        document.getElementById('profile-city').value = this.currentUser.city_level || "TG5";
        document.getElementById('profile-inf').value = this.currentUser.infantry_tier || "TG10";
        document.getElementById('profile-cav').value = this.currentUser.cavalry_tier || "TG10";
        document.getElementById('profile-arch').value = this.currentUser.archer_tier || "TG10";
    }

    async toggleProfileEditMode() {
        if (!this.isEditingProfile) {
            this.isEditingProfile = true;
            this.renderProfileSectionValues();
        } else {
            const targetName = document.getElementById('edit-player-name').value.trim();
            const targetAlliance = document.getElementById('edit-player-alliance').value.trim();
            
            if(!targetName) return alert("Player Name cannot be completely blank.");

            const updatedFields = {
                player_name: targetName,
                current_alliance: targetAlliance,
                city_level: document.getElementById('profile-city').value,
                infantry_tier: document.getElementById('profile-inf').value,
                cavalry_tier: document.getElementById('profile-cav').value,
                archer_tier: document.getElementById('profile-arch').value
            };

            const { error } = await _supabase.from('players').update(updatedFields).eq('player_id', parseInt(this.currentUser.player_id));
            
            if (error) {
                alert("Database transmission error sync aborted: " + error.message);
                return;
            }

            this.currentUser = { ...this.currentUser, ...updatedFields };
            this.isEditingProfile = false;
            this.renderProfileSectionValues();
            
            await this.refreshGlobalDataMaps();
            alert("Your military profile has been updated and synchronized!");
        }
    }

    async refreshGlobalDataMaps() {
        let { data: events } = await _supabase.from('events').select('*').eq('is_active', true).order('created_at', { ascending: false });
        this.activeEvents = events || [];

        for (const ev of this.activeEvents) {
            let { data: parts } = await _supabase.from('event_participations').select('*, players(*)').eq('event_id', ev.event_id);
            this.eventParticipations[ev.event_id] = parts || [];
            
            if (this.eventMatrixTabs[ev.event_id] === undefined) this.eventMatrixTabs[ev.event_id] = 1;
            
            if (this.eventFormStates[ev.event_id] === undefined) {
                this.eventFormStates[ev.event_id] = { 
                    targetPlayerId: parseInt(this.currentUser.player_id) 
                };
            }
        }
        this.renderAllActiveEventBlocks();
    }

    renderAllActiveEventBlocks() {
        const root = document.getElementById('active-events-root');
        if(this.activeEvents.length === 0) {
            root.innerHTML = `<div class="panel" style="text-align:center; color:var(--text-muted);">No operational command activities are currently active.</div>`;
            return;
        }

        const isAdmin = this.currentUser.access_level === 'admin';

        root.innerHTML = this.activeEvents.map(ev => {
            const state = this.eventFormStates[ev.event_id];
            let adminProxyDrop = '';
            if (isAdmin) {
                const options = this.allPlayers.map(p => 
                    `<option value="${p.player_id}" ${parseInt(state.targetPlayerId) === parseInt(p.player_id) ? 'selected' : ''}>Proxy: ${p.player_name}</option>`
                ).join('');
                adminProxyDrop = `<select style="width:auto; padding:3px; font-size:12px;" onchange="app.handleEventProxyChange('${ev.event_id}', this.value)"><option value="${this.currentUser.player_id}" ${parseInt(state.targetPlayerId) === parseInt(this.currentUser.player_id) ? 'selected' : ''}>Acting as: Myself</option>${options}</select>`;
            }

            return `
            <div class="event-container" id="block-${ev.event_id}">
                <div class="event-container-title">
                    <span>⚔️ OPERATION: ${ev.event_title}</span>
                    <span class="badge badge-admin">${ev.event_type.replace('_', ' ').toUpperCase()}</span>
                </div>

                <div class="panel" style="background:#0f1317; margin-bottom:15px;">
                    <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; font-weight:bold; margin-bottom:5px;">Mission Directives</div>
                    <div style="white-space:pre-wrap; font-size:13px; color:#cbd5e1;">${ev.strategy_text || 'No directives logged.'}</div>
                </div>

                <div class="panel" style="background:#1e293b; border-color:#475569;">
                    <div class="panel-title">
                        <span>Registration Submission Form</span>
                        ${adminProxyDrop}
                    </div>
                    <form onsubmit="app.handleFormSubmit(event, '${ev.event_id}')">
                        <div id="form-inner-${ev.event_id}"></div>
                        <button type="submit" class="btn" style="margin-top:15px;">Lock Entry Selection</button>
                    </form>
                </div>

                <div class="panel">
                    <div class="panel-title">Live Deployment Matrix Room</div>
                    <div id="tabs-row-${ev.event_id}" class="tabs hidden">
                        <div class="tab" id="tab-${ev.event_id}-1" onclick="app.switchEventTab('${ev.event_id}', 1)">Day 1: Build</div>
                        <div class="tab" id="tab-${ev.event_id}-2" onclick="app.switchEventTab('${ev.event_id}', 2)">Day 2: Research</div>
                        <div class="tab" id="tab-${ev.event_id}-3" onclick="app.switchEventTab('${ev.event_id}', 3)">Day 3: Cooking</div>
                    </div>
                    <div id="summary-${ev.event_id}" class="summary-bar hidden"></div>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr id="th-${ev.event_id}"><th>Player Name</th></tr></thead>
                            <tbody id="tb-${ev.event_id}"></tbody>
                        </table>
                    </div>
                    <button id="bulk-save-btn-${ev.event_id}" class="btn hidden" style="margin-top:15px; background:#2e3b4e; border:1px solid var(--accent-orange);" onclick="app.saveBulkCombatAssignments('${ev.event_id}')">Lock R4 Matrix Assignments</button>
                </div>
            </div>`;
        }).join('');

        this.activeEvents.forEach(ev => {
            this.buildInnerFormMarkup(ev.event_id, ev.event_type);
            this.populateFormFieldsFromMemory(ev.event_id);
            this.drawEventMatrixGrid(ev.event_id, ev.event_type);
        });
    }

    buildInnerFormMarkup(eventId, type) {
        const target = document.getElementById(`form-inner-${eventId}`);
        if(type === 'kvk_prep') {
            target.innerHTML = `
            <div style="margin-bottom:15px; border-left:3px solid #3b82f6; padding-left:10px;">
                <label style="color:#3b82f6;">Request Chief Minister Title Day 1 (+10% Build)?</label>
                <div class="toggle-group">
                    <div class="toggle-btn" id="t-d1-y-${eventId}" onclick="app.setFormToggleUi('${eventId}','d1',true)">YES</div>
                    <div class="toggle-btn" id="t-d1-n-${eventId}" onclick="app.setFormToggleUi('${eventId}','d1',false)">NO</div>
                </div>
                <div id="fields-${eventId}-d1" class="hidden">
                    <label style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">Select Target Hours Window:</label>
                    <div class="checkbox-grid" id="grid-${eventId}-d1" style="margin-bottom:10px;"></div>
                    <input type="number" id="input-${eventId}-d1-speeds" placeholder="Construction Speedups (Whole Days)" style="margin-bottom:5px;">
                    <input type="number" id="input-${eventId}-d1-gold" placeholder="True Gold Value" style="margin-bottom:5px;">
                    <input type="number" id="input-${eventId}-d1-tempered" placeholder="Tempered Gold Count">
                </div>
            </div>
            <div style="margin-bottom:15px; border-left:3px solid #a855f7; padding-left:10px;">
                <label style="color:#a855f7;">Request Chief Minister Title Day 2 (+10% Tech)?</label>
                <div class="toggle-group">
                    <div class="toggle-btn" id="t-d2-y-${eventId}" onclick="app.setFormToggleUi('${eventId}','d2',true)">YES</div>
                    <div class="toggle-btn" id="t-d2-n-${eventId}" onclick="app.setFormToggleUi('${eventId}','d2',false)">NO</div>
                </div>
                <div id="fields-${eventId}-d2" class="hidden">
                    <label style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">Select Target Hours Window:</label>
                    <div class="checkbox-grid" id="grid-${eventId}-d2" style="margin-bottom:10px;"></div>
                    <input type="number" id="input-${eventId}-d2-speeds" placeholder="Research Speedups (Whole Days)" style="margin-bottom:5px;">
                    <input type="number" id="input-${eventId}-d2-dust" placeholder="True Gold Dust Quantity">
                </div>
            </div>
            <div style="margin-bottom:15px; border-left:3px solid #10b981; padding-left:10px;">
                <label style="color:#10b981;">Request Noble Advisor Title Day 3 (+50% Cook)?</label>
                <div class="toggle-group">
                    <div class="toggle-btn" id="t-d3-y-${eventId}" onclick="app.setFormToggleUi('${eventId}','d3',true)">YES</div>
                    <div class="toggle-btn" id="t-d3-n-${eventId}" onclick="app.setFormToggleUi('${eventId}','d3',false)">NO</div>
                </div>
                <div id="fields-${eventId}-d3" class="hidden">
                    <label style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">Select Target Hours Window:</label>
                    <div class="checkbox-grid" id="grid-${eventId}-d3" style="margin-bottom:10px;"></div>
                    <input type="number" id="input-${eventId}-d3-speeds" placeholder="Training Speedups (Whole Days)">
                </div>
            </div>`;
            
            ['d1','d2','d3'].forEach(day => {
                const grid = document.getElementById(`grid-${eventId}-${day}`);
                grid.innerHTML = TIME_SLOTS.map((slot, i) => `
                    <div class="checkbox-item">
                        <input type="checkbox" id="chk-${eventId}-${day}-${i}" value="${slot}">
                        <span>${slot}</span>
                    </div>`).join('');
            });
            // Init layout visibility to false
            ['d1','d2','d3'].forEach(day => this.setFormToggleUi(eventId, day, false));
        } else {
            target.innerHTML = `
            <div class="form-group">
                <label>Select Deployment Window Parameters:</label>
                <div class="toggle-group">
                    <div class="toggle-btn" id="bt-need-${eventId}" onclick="app.setCombatStatusUi('${eventId}','needed')">As long as needed</div>
                    <div class="toggle-btn" id="bt-cant-${eventId}" onclick="app.setCombatStatusUi('${eventId}','cannot')">Cannot Plan</div>
                </div>
            </div>
            <div class="form-group">
                <label>Specific Time Restrictions / Custom Hours Text Description:</label>
                <textarea id="input-${eventId}-custom-text" placeholder="Specify availability windows in UTC if restricted..."></textarea>
            </div>`;
            this.setCombatStatusUi(eventId, 'needed');
        }
    }

    setFormToggleUi(eventId, day, val) {
        const yesBtn = document.getElementById(`t-${day}-y-${eventId}`);
        const noBtn = document.getElementById(`t-${day}-n-${eventId}`);
        const fieldsDiv = document.getElementById(`fields-${eventId}-${day}`);
        
        if(yesBtn) { if(val) yesBtn.classList.add('active'); else yesBtn.classList.remove('active'); }
        if(noBtn) { if(!val) noBtn.classList.add('active'); else noBtn.classList.remove('active'); }
        if(fieldsDiv) fieldsDiv.className = val ? '' : 'hidden';
    }

    setCombatStatusUi(eventId, status) {
        const needBtn = document.getElementById(`bt-need-${eventId}`);
        const cantBtn = document.getElementById(`bt-cant-${eventId}`);
        if(needBtn) { if(status === 'needed') needBtn.classList.add('active'); else needBtn.classList.remove('active'); }
        if(cantBtn) { if(status === 'cannot') cantBtn.classList.add('active'); else cantBtn.classList.remove('active'); }
    }

    handleEventProxyChange(eventId, targetPid) {
        this.eventFormStates[eventId].targetPlayerId = parseInt(targetPid);
        this.populateFormFieldsFromMemory(eventId);
    }

    populateFormFieldsFromMemory(eventId) {
        const ev = this.activeEvents.find(e => e.event_id === eventId);
        const state = this.eventFormStates[eventId];
        
        const matchRecord = this.eventParticipations[eventId].find(p => parseInt(p.player_id) === parseInt(state.targetPlayerId));

        if(ev.event_type === 'kvk_prep') {
            ['d1', 'd2', 'd3'].forEach(d => this.setFormToggleUi(eventId, d, false));
        } else {
            this.setCombatStatusUi(eventId, 'needed');
            const ct = document.getElementById(`input-${eventId}-custom-text`);
            if(ct) ct.value = '';
        }

        if(!matchRecord || !matchRecord.player_responses) return;
        
        let res = matchRecord.player_responses;
        if (typeof res === 'string') {
            try { res = JSON.parse(res); } catch(e) { console.error("Parsing error", e); return; }
        }

        if(ev.event_type === 'kvk_prep') {
            if(res.d1_opt_in) {
                this.setFormToggleUi(eventId, 'd1', true);
                const targetSpeeds = document.getElementById(`input-${eventId}-d1-speeds`);
                const targetGold = document.getElementById(`input-${eventId}-d1-gold`);
                const targetTempered = document.getElementById(`input-${eventId}-d1-tempered`);

                if(targetSpeeds) targetSpeeds.value = res.d1_speeds ?? '';
                if(targetGold) targetGold.value = res.d1_gold ?? '';
                if(targetTempered) targetTempered.value = res.d1_tempered ?? '';

                TIME_SLOTS.forEach((slot, i) => { 
                    const chk = document.getElementById(`chk-${eventId}-d1-${i}`);
                    if(chk) chk.checked = !!(res.d1_slots && res.d1_slots.includes(slot));
                });
            }
            
            if(res.d2_opt_in) {
                this.setFormToggleUi(eventId, 'd2', true);
                const targetSpeeds = document.getElementById(`input-${eventId}-d2-speeds`);
                const targetDust = document.getElementById(`input-${eventId}-d2-dust`);

                if(targetSpeeds) targetSpeeds.value = res.d2_speeds ?? '';
                if(targetDust) targetDust.value = res.d2_dust ?? '';

                TIME_SLOTS.forEach((slot, i) => { 
                    const chk = document.getElementById(`chk-${eventId}-d2-${i}`);
                    if(chk) chk.checked = !!(res.d2_slots && res.d2_slots.includes(slot));
                });
            }

            if(res.d3_opt_in) {
                this.setFormToggleUi(eventId, 'd3', true);
                const targetSpeeds = document.getElementById(`input-${eventId}-d3-speeds`);
                if(targetSpeeds) targetSpeeds.value = res.d3_speeds ?? '';

                TIME_SLOTS.forEach((slot, i) => { 
                    const chk = document.getElementById(`chk-${eventId}-d3-${i}`);
                    if(chk) chk.checked = !!(res.d3_slots && res.d3_slots.includes(slot));
                });
            }
        } else {
            this.setCombatStatusUi(eventId, res.combat_status || 'needed');
            const targetCustomText = document.getElementById(`input-${eventId}-custom-text`);
            if(targetCustomText) targetCustomText.value = res.custom_hours || '';
        }
    }

    switchEventTab(eventId, dayNum) {
        this.eventMatrixTabs[eventId] = dayNum;
        this.drawEventMatrixGrid(eventId, 'kvk_prep');
    }

    drawEventMatrixGrid(eventId, type) {
        const currentTab = this.eventMatrixTabs[eventId];
        const dataRows = this.eventParticipations[eventId] || [];
        const th = document.getElementById(`th-${eventId}`);
        const tb = document.getElementById(`tb-${eventId}`);
        const banner = document.getElementById('summary-' + eventId);
        const tabRow = document.getElementById('tabs-row-' + eventId);
        const isAdmin = this.currentUser.access_level === 'admin';

        if(type === 'kvk_prep') {
            tabRow.classList.remove('hidden');
            banner.classList.remove('hidden');
            
            [1,2,3].forEach(d => {
                const tabEl = document.getElementById(`tab-${eventId}-${d}`);
                if(tabEl) tabEl.className = `tab ${d === currentTab ? 'active' : ''}`;
            });

            let activeTitleRequests = 0, aggregateSpeeds = 0, resourceAgg = 0;
            dataRows.forEach(p => {
                let r = p.player_responses || {};
                if (typeof r === 'string') { try { r = JSON.parse(r); } catch(e) { r = {}; } }
                
                if(currentTab === 1 && r.d1_opt_in) { activeTitleRequests++; aggregateSpeeds += (r.d1_speeds || 0); resourceAgg += (r.d1_gold || 0); }
                if(currentTab === 2 && r.d2_opt_in) { activeTitleRequests++; aggregateSpeeds += (r.d2_speeds || 0); resourceAgg += (r.d2_dust || 0); }
                if(currentTab === 3 && r.d3_opt_in) { activeTitleRequests++; aggregateSpeeds += (r.d3_speeds || 0); }
            });

            if(currentTab === 1) banner.innerHTML = `<strong>Day 1 Summary:</strong> ${activeTitleRequests} Title Requests | Construction Speedups: ${aggregateSpeeds}d | Total True Gold: ${resourceAgg}`;
            if(currentTab === 2) banner.innerHTML = `<strong>Day 2 Summary:</strong> ${activeTitleRequests} Title Requests | Research Speedups: ${aggregateSpeeds}d | Total Dust Assets: ${resourceAgg}`;
            if(currentTab === 3) banner.innerHTML = `<strong>Day 3 Summary:</strong> ${activeTitleRequests} Title Requests | Training Speeds: ${aggregateSpeeds}d`;

            th.innerHTML = `<th>Player Name</th><th>Alliance Tag</th><th>Profile Stats</th><th>Title Opt-In</th><th>Requested Target Slots</th><th>Resource Metrics</th>`;
            tb.innerHTML = dataRows.map(p => {
                let r = p.player_responses || {};
                if (typeof r === 'string') { try { r = JSON.parse(r); } catch(e) { r = {}; } }
                
                const user = p.players || { player_name: 'Unknown User' };
                const pStr = `${user.city_level || '--'}/${user.infantry_tier || '--'}/${user.cavalry_tier || '--'}/${user.archer_tier || '--'}`;
                
                let valOpt = "❌ No";
                let valSlots = "--";
                let valRes = "--";
                if(currentTab === 1 && r.d1_opt_in) { valOpt = "✅ Yes"; valSlots = r.d1_slots?.join(', ') || ''; valRes = `🏗️ ${r.d1_speeds}d Speeds / ${r.d1_gold} Gold / ${r.d1_tempered} Temp`; }
                if(currentTab === 2 && r.d2_opt_in) { valOpt = "✅ Yes"; valSlots = r.d2_slots?.join(', ') || ''; valRes = `🔬 ${r.d2_speeds}d Speeds / ${r.d2_dust} Dust`; }
                if(currentTab === 3 && r.d3_opt_in) { valOpt = "✅ Yes"; valSlots = r.d3_slots?.join(', ') || ''; valRes = `⚔️ ${r.d3_speeds}d Training`; }

                return `<tr><td><strong>${user.player_name}</strong></td><td><span class="badge" style="background:#232d37; color:var(--accent-orange);">${user.current_alliance || '--'}</span></td><td><span class="badge">${pStr}</span></td><td>${valOpt}</td><td style="font-size:11px; max-width:180px; overflow:hidden; text-overflow:ellipsis;">${valSlots}</td><td>${valRes}</td></tr>`;
            }).join('');
        } else {
            if(isAdmin) document.getElementById(`bulk-save-btn-${eventId}`).classList.remove('hidden');
            th.innerHTML = `<th>Player Name</th><th>Alliance Tag</th><th>Profile Stats</th><th>Availability Status Output</th><th>R4 Strategic Deployment Matrix Tags</th>`;
            
            tb.innerHTML = dataRows.map((p, idx) => {
                let r = p.player_responses || {};
                if (typeof r === 'string') { try { r = JSON.parse(r); } catch(e) { r = {}; } }
                
                const a = p.r4_assignments || { battle_alliance: '', combat_role: 'Joiner' };
                const user = p.players || { player_name: 'Unknown' };
                const pStr = `${user.city_level || '--'}/${user.infantry_tier || '--'}/${user.cavalry_tier || '--'}/${user.archer_tier || '--'}`;
                
                let avStr = r.combat_status === 'cannot' ? '❌ Cannot Plan' : '✅ As long as needed';
                if(r.custom_hours) avStr += ` <div style="color:var(--text-muted); font-style:italic; font-size:11px;">"${r.custom_hours}"</div>`;

                if(isAdmin) {
                    return `
                    <tr>
                        <td><strong>${user.player_name}</strong></td>
                        <td><span class="badge" style="background:#232d37; color:var(--accent-orange);">${user.current_alliance || '--'}</span></td>
                        <td><span class="badge">${pStr}</span></td>
                        <td>${avStr}</td>
                        <td>
                            <input type="text" id="assign-all-${eventId}-${idx}" value="${a.battle_alliance || ''}" placeholder="Alliance Tag" style="width:90px; padding:4px; font-size:11px; display:inline-block;">
                            <select id="assign-role-${eventId}-${idx}" style="width:90px; padding:4px; font-size:11px; display:inline-block;">
                                <option value="Rally Lead" ${a.combat_role === 'Rally Lead' ? 'selected' : ''}>Rally Lead</option>
                                <option value="Joiner" ${a.combat_role === 'Joiner' ? 'selected' : ''}>Joiner</option>
                                <option value="Reserve" ${a.combat_role === 'Reserve' ? 'selected' : ''}>Reserve</option>
                            </select>
                            <input type="hidden" id="assign-pid-${eventId}-${idx}" value="${p.player_id}">
                        </td>
                    </tr>`;
                } else {
                    return `<tr><td><strong>${user.player_name}</strong></td><td><span class="badge" style="background:#232d37; color:var(--accent-orange);">${user.current_alliance || '--'}</span></td><td><span class="badge">${pStr}</span></td><td>${avStr}</td><td>🚀 Alliance: <span style="color:var(--accent-orange); font-weight:bold;">${a.battle_alliance || 'Unassigned'}</span> | Role: <span class="badge badge-admin">${a.combat_role || 'Joiner'}</span></td></tr>`;
                }
            }).join('');
        }
    }

    async handleFormSubmit(e, eventId) {
        e.preventDefault();
        const ev = this.activeEvents.find(e => e.event_id === eventId);
        const state = this.eventFormStates[eventId];
        const targetedPlayerId = parseInt(state.targetPlayerId);
        
        let responses = {};

        if(ev.event_type === 'kvk_prep') {
            const d1Active = document.getElementById(`t-d1-y-${eventId}`).classList.contains('active');
            const d2Active = document.getElementById(`t-d2-y-${eventId}`).classList.contains('active');
            const d3Active = document.getElementById(`t-d3-y-${eventId}`).classList.contains('active');

            if(d1Active) {
                responses.d1_opt_in = true;
                responses.d1_speeds = parseInt(document.getElementById(`input-${eventId}-d1-speeds`).value) || 0;
                responses.d1_gold = parseInt(document.getElementById(`input-${eventId}-d1-gold`).value) || 0;
                responses.d1_tempered = parseInt(document.getElementById(`input-${eventId}-d1-tempered`).value) || 0;
                responses.d1_slots = [];
                TIME_SLOTS.forEach((slot, i) => { if(document.getElementById(`chk-${eventId}-d1-${i}`).checked) responses.d1_slots.push(slot); });
            }
            if(d2Active) {
                responses.d2_opt_in = true;
                responses.d2_speeds = parseInt(document.getElementById(`input-${eventId}-d2-speeds`).value) || 0;
                responses.d2_dust = parseInt(document.getElementById(`input-${eventId}-d2-dust`).value) || 0;
                responses.d2_slots = [];
                TIME_SLOTS.forEach((slot, i) => { if(document.getElementById(`chk-${eventId}-d2-${i}`).checked) responses.d2_slots.push(slot); });
            }
            if(d3Active) {
                responses.d3_opt_in = true;
                responses.d3_speeds = parseInt(document.getElementById(`input-${eventId}-d3-speeds`).value) || 0;
                responses.d3_slots = [];
                TIME_SLOTS.forEach((slot, i) => { if(document.getElementById(`chk-${eventId}-d3-${i}`).checked) responses.d3_slots.push(slot); });
            }
        } else {
            const cantActive = document.getElementById(`bt-cant-${eventId}`)?.classList.contains('active');
            responses.combat_status = cantActive ? 'cannot' : 'needed';
            responses.custom_hours = document.getElementById(`input-${eventId}-custom-text`).value.trim();
        }

        const finalPayload = {
            event_id: eventId,
            player_id: targetedPlayerId,
            player_responses: responses,
            updated_at: new Date().toISOString()
        };

        const existingRecord = this.eventParticipations[eventId].find(p => parseInt(p.player_id) === targetedPlayerId);
        if (existingRecord && existingRecord.id) {
            finalPayload.id = existingRecord.id; 
        }

        const { error } = await _supabase.from('event_participations').upsert(finalPayload);

        if(error) {
            alert("Database Transmission Sync Failure: " + error.message);
            return;
        }

        alert("Operation changes successfully recorded and matched!");
        await this.refreshGlobalDataMaps();
    }

    async saveBulkCombatAssignments(eventId) {
        let idx = 0;
        while(document.getElementById(`assign-pid-${eventId}-${idx}`)) {
            const pId = parseInt(document.getElementById(`assign-pid-${eventId}-${idx}`).value);
            const bAll = document.getElementById(`assign-all-${eventId}-${idx}`).value.trim();
            const cRole = document.getElementById(`assign-role-${eventId}-${idx}`).value;

            await _supabase.from('event_participations').update({
                r4_assignments: { battle_alliance: bAll, combat_role: cRole }
            }).eq('event_id', eventId).eq('player_id', pId);
            
            idx++;
        }
        alert("Combat tactical assignments synchronized successfully!");
        await this.refreshGlobalDataMaps();
    }

    handleAdminTemplatePopulate() {
        const type = document.getElementById('adm-type').value;
        const baseTemplates = {
            kvk_prep: "## 🏗️ KVK PREPARATION PHASE\n• Complete target resource declarations inside forms below.",
            kvk_battle: "## ⚔️ KVK COMBAT OPERATIONS\n• Track real-time roster war alliances assignments mapped below.",
            tyrant: "## 👑 TYRANT FIGHT MATCHUP\n• Focus target parameters based on strategic timers."
        };
        document.getElementById('adm-strategy').value = baseTemplates[type];
    }

    async launchNewOperation() {
        const title = document.getElementById('adm-title').value.trim();
        const type = document.getElementById('adm-type').value;
        const strategy = document.getElementById('adm-strategy').value;

        if(!title) return alert("Operation title required.");

        await _supabase.from('events').insert({
            event_title: title,
            event_type: type,
            strategy_text: strategy,
            is_active: true
        });

        alert("New Operation Launched Successfully!");
        document.getElementById('adm-title').value = '';
        await this.refreshGlobalDataMaps();
    }
}

const app = new AppConfig();
window.onload = () => app.init();
</script>
