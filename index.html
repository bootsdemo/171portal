<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>171 event planning portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background-color: #0056b3; color: #fff; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background-color: #004080; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        .hidden { display: none !important; }
        .profile-section, .event-section { margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; background: #fafafa; }
        .toggle-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .toggle-btn { flex: 1; padding: 10px; background: #eee; text-align: center; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }
        .toggle-btn.active { background: #0056b3; color: #fff; border-color: #004080; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; max-height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; background: #fff; margin-bottom: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 5px; }
        .event-action-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #fff; border: 1px solid #eee; margin-bottom: 8px; border-radius: 4px; }
        .closed-banner { background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 12px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>171 event planning portal</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a id="admin-link" href="admin.html" class="hidden" style="font-size: 13px; color: #0056b3;">Admin Dashboard →</a>
            <button id="global-logout-btn" class="btn btn-secondary hidden" onclick="app.logout()">Log Out</button>
        </div>
    </header>

    <!-- Login -->
    <div id="login-panel" style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 4px;">
        <h3>Login</h3>
        <div class="form-group">
            <label for="login-id">Player ID:</label>
            <input type="number" id="login-id" placeholder="Enter your Player ID">
        </div>
        <button class="btn" style="width: 100%;" onclick="app.login()">Login</button>
    </div>

    <!-- Player Workspace -->
    <div id="app-workspace" class="hidden">

        <!-- My profile -->
        <div class="profile-section" id="player-profile-card">
            <h2>My profile</h2>
            <div class="form-group">
                <p><strong>Player ID:</strong> <span id="display-player-id">--</span></p>
                <div id="wrapper-player-name"><strong>Player Name:</strong> <span id="display-player-name">--</span></div>
                <div id="wrapper-player-alliance" style="margin-top: 5px;"><strong>Alliance:</strong> <span id="display-player-alliance">--</span></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                <div class="form-group"><label>City Level:</label><select id="profile-city" disabled><option value="TG5">TG5</option><option value="TG6">TG6</option><option value="TG7">TG7</option><option value="TG8">TG8</option><option value="TG9">TG9</option><option value="TG10">TG10</option></select></div>
                <div class="form-group"><label>Infantry Level:</label><select id="profile-inf" disabled><option value="TG10">TG10</option><option value="TG11">TG11</option></select></div>
                <div class="form-group"><label>Cavalry Level:</label><select id="profile-cav" disabled><option value="TG10">TG10</option><option value="TG11">TG11</option></select></div>
                <div class="form-group"><label>Archer Level:</label><select id="profile-arch" disabled><option value="TG10">TG10</option><option value="TG11">TG11</option></select></div>
            </div>
            <button id="profile-action-btn" class="btn btn-secondary" style="margin-top: 10px;" onclick="app.toggleProfileEditMode()">Edit Profile</button>
        </div>

        <!-- Event list -->
        <div class="event-section" id="event-actions-panel">
            <h2>Event list</h2>
            <div id="event-navigation-list"></div>
        </div>

        <!-- Event form workspace (on-demand) -->
        <div id="focused-event-workspace-root"></div>

    </div>
</div>

<script src="shared.js"></script>
<script>
// PlayerConfig extends AppConfig with player-only features.
class PlayerConfig extends AppConfig {

    // --- Hook overrides ---

    async onLoginSuccess() {
        if (this.currentUser.access_level === 'admin') {
            document.getElementById('admin-link').classList.remove('hidden');
        }
    }

    onLogoutCleanup() {
        document.getElementById('admin-link').classList.add('hidden');
        document.getElementById('focused-event-workspace-root').innerHTML = '';
    }

    async onEventsLoaded() {
        this.renderEventList();
    }


    // --- Player: event list ---

    renderEventList() {
        const targetNav = document.getElementById('event-navigation-list');
        if (this.eventsList.length === 0) {
            targetNav.innerHTML = '<p style="color:#666; text-align:center;">No events listed.</p>';
            return;
        }
        targetNav.innerHTML = this.eventsList.map(ev => {
            const statusLabel = ev.is_active
                ? '<span style="color:green; font-weight:bold;">[Active]</span>'
                : '<span style="color:#666;">[Closed]</span>';
            const isOpened = this.currentFocusedEvent && this.currentFocusedEvent.event_id === ev.event_id;
            const buttonText = isOpened ? 'Close Form' : 'View for ' + ev.event_title;
            const clickAction = isOpened ? 'app.closeWorkspaceForm()' : "app.loadFocusedEventWorkspace('" + ev.event_id + "')";
            return '<div class="event-action-item"><div><strong>' + ev.event_title + '</strong> ' + statusLabel + '</div><button class="btn btn-secondary" onclick="' + clickAction + '">' + buttonText + '</button></div>';
        }).join('');
    }


    // --- Player: event form workspace ---

    async loadFocusedEventWorkspace(eventId) {
        const ev = this.eventsList.find(e => e.event_id === eventId);
        if (!ev) return;

        this.currentFocusedEvent = ev;

        let { data: participation, error } = await _supabase
            .from('event_participations').select('*')
            .eq('event_id', eventId)
            .eq('player_id', parseInt(this.currentUser.player_id))
            .maybeSingle();

        if (error) return alert("Error fetching response records.");

        if (participation && participation.player_responses && typeof participation.player_responses === 'string') {
            try { participation.player_responses = JSON.parse(participation.player_responses); } catch(e) { console.error(e); }
        }
        this.currentFocusedUserResponse = participation ? participation.player_responses : null;

        const root = document.getElementById('focused-event-workspace-root');
        const disableAttr = ev.is_active ? '' : 'disabled';
        const submitBtnStyle = ev.is_active ? '' : 'style="display:none;"';

        // Closed-event banner: shows when event is not active, explaining the form is read-only
        const closedBanner = ev.is_active ? '' : '<div class="closed-banner">⚠️ This event is closed. You can review your previous submission below but cannot make changes.</div>';

        // If closed and no previous submission, show a different message
        const noSubmissionMsg = (!ev.is_active && !this.currentFocusedUserResponse)
            ? '<div class="closed-banner">⚠️ This event is closed. You did not submit a form for this event.</div>'
            : closedBanner;

        root.innerHTML = '<div class="event-section" id="workspace-block-' + ev.event_id + '" style="background:#fff; margin-top:20px;"><h2>Event form: ' + ev.event_title + '</h2>' + noSubmissionMsg + '<div style="background:#f0f0f0; padding:10px; border-radius:4px; margin-bottom:15px; white-space:pre-wrap;">' + (ev.strategy_text || 'No strategic information.') + '</div><form onsubmit="app.handleFormSubmit(event)"><fieldset ' + disableAttr + ' style="border:none; padding:0; margin:0;"><div id="form-inner-slots"></div><button type="submit" class="btn" ' + submitBtnStyle + ' style="margin-top:15px;">Submit Response</button></fieldset></form></div>';

        this.buildInnerFormMarkup(ev.event_type);
        this.populateFormFieldsFromMemory(ev.event_type);
        this.renderEventList();
        document.getElementById('workspace-block-' + ev.event_id).scrollIntoView({ behavior: 'smooth' });
    }

    closeWorkspaceForm() {
        this.currentFocusedEvent = null;
        this.currentFocusedUserResponse = null;
        document.getElementById('focused-event-workspace-root').innerHTML = '';
        this.renderEventList();
    }


    // --- Player: form builder ---

    buildInnerFormMarkup(type) {
        const target = document.getElementById('form-inner-slots');
        if (type === 'kvk_prep') {
            target.innerHTML = '<div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:15px;"><label style="color:#0056b3; font-size:14px;">Request Chief Minister Title Day 1 (+10% Build)?</label><div class="toggle-group"><div class="toggle-btn" id="t-d1-y" onclick="app.setFormToggleUi(\'d1\',true)">YES</div><div class="toggle-btn" id="t-d1-n" onclick="app.setFormToggleUi(\'d1\',false)">NO</div></div><div id="fields-d1" class="hidden" style="margin-top:10px;"><label style="font-size:12px; margin-bottom:5px;">Select Hours Window:</label><div class="checkbox-grid" id="grid-d1"></div><div class="form-group"><label for="input-d1-speeds">Construction Speedups (Whole Days):</label><input type="number" id="input-d1-speeds"></div><div class="form-group"><label for="input-d1-gold">True Gold Count:</label><input type="number" id="input-d1-gold"></div><div class="form-group"><label for="input-d1-tempered">Tempered Gold Count:</label><input type="number" id="input-d1-tempered"></div></div></div><div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:15px;"><label style="color:#0056b3; font-size:14px;">Request Chief Minister Title Day 2 (+10% Tech)?</label><div class="toggle-group"><div class="toggle-btn" id="t-d2-y" onclick="app.setFormToggleUi(\'d2\',true)">YES</div><div class="toggle-btn" id="t-d2-n" onclick="app.setFormToggleUi(\'d2\',false)">NO</div></div><div id="fields-d2" class="hidden" style="margin-top:10px;"><label style="font-size:12px; margin-bottom:5px;">Select Hours Window:</label><div class="checkbox-grid" id="grid-d2"></div><div class="form-group"><label for="input-d2-speeds">Research Speedups (Whole Days):</label><input type="number" id="input-d2-speeds"></div><div class="form-group"><label for="input-d2-dust">True Gold Dust Count:</label><input type="number" id="input-d2-dust"></div></div></div><div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:15px;"><label style="color:#0056b3; font-size:14px;">Request Noble Advisor Title Day 3 (+50% buff)?</label><div class="toggle-group"><div class="toggle-btn" id="t-d3-y" onclick="app.setFormToggleUi(\'d3\',true)">YES</div><div class="toggle-btn" id="t-d3-n" onclick="app.setFormToggleUi(\'d3\',false)">NO</div></div><div id="fields-d3" class="hidden" style="margin-top:10px;"><label style="font-size:12px; margin-bottom:5px;">Select Hours Window:</label><div class="checkbox-grid" id="grid-d3"></div><div class="form-group"><label for="input-d3-speeds">Training Speedups (Whole Days):</label><input type="number" id="input-d3-speeds"></div></div></div>';

            ['d1','d2','d3'].forEach(day => {
                const grid = document.getElementById('grid-' + day);
                if (grid) {
                    grid.innerHTML = TIME_SLOTS.map((slot, i) => '<div class="checkbox-item"><input type="checkbox" id="chk-' + day + '-' + i + '" value="' + slot + '"><span>' + slot + '</span></div>').join('');
                }
            });
            ['d1','d2','d3'].forEach(day => this.setFormToggleUi(day, false));
        } else {
            target.innerHTML = '<div class="form-group"><label>Select Deployment Parameters:</label><div class="toggle-group"><div class="toggle-btn" id="bt-need" onclick="app.setCombatStatusUi(\'needed\')">As long as needed</div><div class="toggle-btn" id="bt-cant" onclick="app.setCombatStatusUi(\'cannot\')">Cannot Plan</div></div></div><div class="form-group"><label for="input-custom-text">Custom Hours / Availability Text:</label><textarea id="input-custom-text"></textarea></div>';
            this.setCombatStatusUi('needed');
        }
    }

    setFormToggleUi(day, val) {
        const yesBtn = document.getElementById('t-' + day + '-y');
        const noBtn = document.getElementById('t-' + day + '-n');
        const fieldsDiv = document.getElementById('fields-' + day);
        if (yesBtn) { if(val) yesBtn.classList.add('active'); else yesBtn.classList.remove('active'); }
        if (noBtn) { if(!val) noBtn.classList.add('active'); else noBtn.classList.remove('active'); }
        if (fieldsDiv) fieldsDiv.className = val ? '' : 'hidden';
    }

    setCombatStatusUi(status) {
        const needBtn = document.getElementById('bt-need');
        const cantBtn = document.getElementById('bt-cant');
        if (needBtn) { if(status === 'needed') needBtn.classList.add('active'); else needBtn.classList.remove('active'); }
        if (cantBtn) { if(status === 'cannot') cantBtn.classList.add('active'); else cantBtn.classList.remove('active'); }
    }


    // --- Player: pre-fill form from saved response ---

    populateFormFieldsFromMemory(type) {
        let res = this.currentFocusedUserResponse;
        if (!res) return;

        if (type === 'kvk_prep') {
            if (res.d1_opt_in) {
                this.setFormToggleUi('d1', true);
                if(document.getElementById('input-d1-speeds')) document.getElementById('input-d1-speeds').value = res.d1_speeds ?? '';
                if(document.getElementById('input-d1-gold')) document.getElementById('input-d1-gold').value = res.d1_gold ?? '';
                if(document.getElementById('input-d1-tempered')) document.getElementById('input-d1-tempered').value = res.d1_tempered ?? '';
                TIME_SLOTS.forEach((slot, i) => { const chk = document.getElementById('chk-d1-' + i); if(chk) chk.checked = !!(res.d1_slots && res.d1_slots.includes(slot)); });
            }
            if (res.d2_opt_in) {
                this.setFormToggleUi('d2', true);
                if(document.getElementById('input-d2-speeds')) document.getElementById('input-d2-speeds').value = res.d2_speeds ?? '';
                if(document.getElementById('input-d2-dust')) document.getElementById('input-d2-dust').value = res.d2_dust ?? '';
                TIME_SLOTS.forEach((slot, i) => { const chk = document.getElementById('chk-d2-' + i); if(chk) chk.checked = !!(res.d2_slots && res.d2_slots.includes(slot)); });
            }
            if (res.d3_opt_in) {
                this.setFormToggleUi('d3', true);
                if(document.getElementById('input-d3-speeds')) document.getElementById('input-d3-speeds').value = res.d3_speeds ?? '';
                TIME_SLOTS.forEach((slot, i) => { const chk = document.getElementById('chk-d3-' + i); if(chk) chk.checked = !!(res.d3_slots && res.d3_slots.includes(slot)); });
            }
        } else {
            this.setCombatStatusUi(res.combat_status || 'needed');
            const ct = document.getElementById('input-custom-text');
            if (ct) ct.value = res.custom_hours || '';
        }
    }


    // --- Player: form submission ---

    async handleFormSubmit(e) {
        e.preventDefault();
        if (!this.currentFocusedEvent) return;

        const eventId = this.currentFocusedEvent.event_id;
        const type = this.currentFocusedEvent.event_type;
        let responses = {};
        let summaryLines = [];

        if (type === 'kvk_prep') {
            const d1Active = document.getElementById('t-d1-y')?.classList.contains('active');
            const d2Active = document.getElementById('t-d2-y')?.classList.contains('active');
            const d3Active = document.getElementById('t-d3-y')?.classList.contains('active');

            if (d1Active) {
                responses.d1_opt_in = true;
                responses.d1_speeds = parseInt(document.getElementById('input-d1-speeds').value) || 0;
                responses.d1_gold = parseInt(document.getElementById('input-d1-gold').value) || 0;
                responses.d1_tempered = parseInt(document.getElementById('input-d1-tempered').value) || 0;
                responses.d1_slots = [];
                TIME_SLOTS.forEach((slot, i) => { if(document.getElementById('chk-d1-' + i)?.checked) responses.d1_slots.push(slot); });
                summaryLines.push('- Day 1 (Build): Yes [Speedups: ' + responses.d1_speeds + 'd, True Gold Count: ' + responses.d1_gold + ', Tempered Gold Count: ' + responses.d1_tempered + ', Slots Checked: ' + responses.d1_slots.length + ']');
            } else { summaryLines.push('- Day 1 (Build): No'); }

            if (d2Active) {
                responses.d2_opt_in = true;
                responses.d2_speeds = parseInt(document.getElementById('input-d2-speeds').value) || 0;
                responses.d2_dust = parseInt(document.getElementById('input-d2-dust').value) || 0;
                responses.d2_slots = [];
                TIME_SLOTS.forEach((slot, i) => { if(document.getElementById('chk-d2-' + i)?.checked) responses.d2_slots.push(slot); });
                summaryLines.push('- Day 2 (Research): Yes [Speedups: ' + responses.d2_speeds + 'd, True Gold Dust Count: ' + responses.d2_dust + ', Slots Checked: ' + responses.d2_slots.length + ']');
            } else { summaryLines.push('- Day 2 (Research): No'); }

            if (d3Active) {
                responses.d3_opt_in = true;
                responses.d3_speeds = parseInt(document.getElementById('input-d3-speeds').value) || 0;
                responses.d3_slots = [];
                TIME_SLOTS.forEach((slot, i) => { if(document.getElementById('chk-d3-' + i)?.checked) responses.d3_slots.push(slot); });
                summaryLines.push('- Day 3 (Cooking): Yes [Speedups: ' + responses.d3_speeds + 'd, Slots Checked: ' + responses.d3_slots.length + ']');
            } else { summaryLines.push('- Day 3 (Cooking): No'); }
        } else {
            const cantActive = document.getElementById('bt-cant')?.classList.contains('active');
            responses.combat_status = cantActive ? 'cannot' : 'needed';
            responses.custom_hours = document.getElementById('input-custom-text')?.value.trim() || '';
            summaryLines.push('- Deployment Status: ' + (responses.combat_status === 'cannot' ? 'Cannot Plan' : 'As long as needed'));
            if (responses.custom_hours) summaryLines.push('- Notes: "' + responses.custom_hours + '"');
        }

        const { data: databaseCheck, error: fetchErr } = await _supabase
            .from('event_participations').select('event_id, player_id')
            .eq('event_id', eventId).eq('player_id', parseInt(this.currentUser.player_id)).maybeSingle();
        if (fetchErr) return alert("Verification lookup error: " + fetchErr.message);

        let syncError = null;
        if (databaseCheck) {
            const { error: updateError } = await _supabase
                .from('event_participations').update({ player_responses: responses, updated_at: new Date().toISOString() })
                .eq('event_id', eventId).eq('player_id', parseInt(this.currentUser.player_id));
            syncError = updateError;
        } else {
            const { error: insertError } = await _supabase
                .from('event_participations').insert({ event_id: eventId, player_id: parseInt(this.currentUser.player_id), player_responses: responses, updated_at: new Date().toISOString() });
            syncError = insertError;
        }

        if (syncError) return alert("Database Sync Error: " + syncError.message);

        alert('You selected:\n\n' + summaryLines.join('\n') + '\n\nAbove details are submitted successfully!');
        this.closeWorkspaceForm();
    }
}

const app = new PlayerConfig();
window.onload = () => app.init();
</script>
</body>
</html>
