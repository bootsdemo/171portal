<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alliance Command Center</title>
    <!-- Supabase JS Client Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --panel-border: #334155;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--text-main); }
        
        .panel {
            background: var(--panel-dark);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 8px;
        }

        .hidden { display: none !important; }

        /* Forms & Inputs */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px;
            background: #0f1317;
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea { height: 100px; resize: vertical; }

        /* Buttons */
        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background: #475569; }
        .btn-danger { background: #ef4444; }

        /* Toggles & Checkboxes */
        .toggle-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .toggle-btn {
            flex: 1;
            padding: 10px;
            background: #0f1317;
            border: 1px solid var(--panel-border);
            text-align: center;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            user-select: none;
        }
        .toggle-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            background: #0f1317;
            padding: 10px;
            border: 1px solid var(--panel-border);
            border-radius: 4px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        /* Matrix Tables */
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { background: #0f1317; padding: 12px; color: var(--text-muted); font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid var(--panel-border); }
        tr:hover { background: #243146; }

        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--panel-border); }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background: #0f1317;
            border: 1px solid var(--panel-border);
            border-bottom: none;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            font-size: 13px;
        }
        .tab.active { background: var(--panel-dark); font-weight: bold; border-color: var(--accent-blue); }

        .summary-bar {
            background: #1e293b;
            border-left: 4px solid var(--accent-orange);
            padding: 12px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .badge {
            background: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-admin { background: #7c3aed; color: white; }

        .profile-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .event-container {
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background: #141c2f;
            padding: 20px;
            margin-bottom: 30px;
        }
        .event-container-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-action-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #0f1317;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚔️ Alliance Operation Command Center</h1>
        <button id="global-logout-btn" class="btn btn-secondary hidden" onclick="app.logout()">Secure Log Out</button>
    </header>

    <!-- Authentication Panel Entrance Hub -->
    <div id="login-panel" class="panel" style="max-width: 450px; margin: 60px auto;">
        <div class="panel-title">System Gateway Authentication</div>
        <div class="form-group">
            <label for="login-id">Enter In-Game Roster Player ID</label>
            <input type="number" id="login-id" placeholder="e.g., 45688219">
        </div>
        <button class="btn" style="width: 100%;" onclick="app.login()">Access Matrix System</button>
    </div>

    <!-- Protected Global Application Workspace Context -->
    <div id="app-workspace" class="hidden">
        
        <!-- Military Profile Section Dashboard (Stays As Is) -->
        <div class="panel" id="player-profile-card">
            <div class="panel-title">
                <span>Personal Personnel Deployment Roster Profile</span>
                <button id="profile-action-btn" class="btn btn-secondary" onclick="app.toggleProfileEditMode()">Edit Profile</button>
            </div>
            <div style="display: flex; gap: 40px; background: #0f1317; padding: 15px; border-radius: 4px;">
                <div>System ID Lookup: <span id="display-player-id" style="font-family: monospace; color: var(--accent-orange);">--</span></div>
                <div>Tactical User Call Sign: <span id="wrapper-player-name">--</span></div>
                <div>Assigned Battle Alliance: <span id="wrapper-player-alliance">--</span></div>
            </div>
            <div class="profile-layout">
                <div class="form-group">
                    <label>City Hall Tier Status</label>
                    <select id="profile-city" disabled>
                        <option value="TG5">TG5</option><option value="TG6">TG6</option><option value="TG7">TG7</option>
                        <option value="TG8">TG8</option><option value="TG9">TG9</option><option value="TG10">TG10</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Infantry Military Grade</label>
                    <select id="profile-inf" disabled>
                        <option value="TG10">TG10 Basic</option><option value="TG11">TG11 Advanced</option><option value="TG12">TG12 Elite</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cavalry Shock Core Grade</label>
                    <select id="profile-cav" disabled>
                        <option value="TG10">TG10 Basic</option><option value="TG11">TG11 Advanced</option><option value="TG12">TG12 Elite</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Archer Artillery Unit Grade</label>
                    <select id="profile-arch" disabled>
                        <option value="TG10">TG10 Basic</option><option value="TG11">TG11 Advanced</option><option value="TG12">TG12 Elite</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- R4 High Command Administrator Operations Control Cockpit -->
        <div class="panel hidden" id="admin-control-cockpit" style="border-color: var(--accent-orange);">
            <div class="panel-title" style="color: var(--accent-orange);">🚀 R4 Leadership Strategic Control Deck</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <div class="form-group">
                        <label>Operation Title Definition</label>
                        <input type="text" id="adm-title" placeholder="e.g., KVK S4 Zenith Run">
                    </div>
                    <div class="form-group">
                        <label>Operation Type Classification</label>
                        <select id="adm-type" onchange="app.handleAdminTemplatePopulate()">
                            <option value="kvk_prep">KVK Preparation Node</option>
                            <option value="kvk_battle">Combat Engagement Grid</option>
                        </select>
                    </div>
                    <button class="btn" style="background: var(--accent-orange);" onclick="app.launchNewOperation()">Deploy New Command Window</button>
                </div>
                <div class="form-group">
                    <label>Mission Directive/Strategic Guidelines (Markdown support)</label>
                    <textarea id="adm-strategy" placeholder="Log battlefield strategic guidance scripts details here..."></textarea>
                </div>
            </div>
        </div>

        <!-- Event Actions Navigation List Dashboard Grid -->
        <div class="panel" id="event-actions-panel">
            <div class="panel-title">Available Strategic Operations Hub</div>
            <div id="event-navigation-list">
                <!-- Dynamically loaded events list populated here -->
            </div>
        </div>

        <!-- On-Demand Active Workspace Shell Framework Hook -->
        <div id="focused-event-workspace-root"></div>

    </div>
</div>

<script>
// 🛑 REPLACE THESE WITH YOUR EXACT PROJECT ENDPOINT VALUES BEFORE DEPLOYMENT
const SUPABASE_URL = "https://xuzoznicceskwulsmymq.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1em96bmljY2Vza3d1bHNteW1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NDE0NzQsImV4cCI6MjA5OTQxNzQ3NH0.5YCJ2EzXNGK23Sml7rAOHzY9JX5PZnUrjihDUlZpr8c";

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TIME_SLOTS = ["23.45 utc - 00.15 utc (start of the day)"];
for (let h = 0; h < 24; h++) {
    let sh = String(h).padStart(2, '0');
    TIME_SLOTS.push(`${sh}.15 utc - ${sh}.45 utc`);
    if (h < 23) {
        let nh = String(h + 1).padStart(2, '0');
        TIME_SLOTS.push(`${sh}.45 utc - ${nh}.15 utc`);
    }
}
TIME_SLOTS.push("23.45 utc - 00.15 utc (end of the day)");

class AppConfig {
    constructor() {
        this.currentUser = null;
        this.eventsList = [];
        this.allPlayers = [];
        this.isEditingProfile = false;
        
        // Active states managed strictly for the single lazily expanded operation
        this.currentFocusedEvent = null;
        this.currentFocusedUserResponse = null; 
        this.currentEventOverviewData = [];
        this.currentMatrixTab = 1;
    }

    async init() {
        try {
            const savedId = localStorage.getItem('alliance_matrix_player_id');
            if (savedId) {
                document.getElementById('login-id').value = savedId;
                await this.login();
            }
        } catch (err) {
            console.error("Initialization failed:", err);
        }
    }

    async login() {
        const idInput = document.getElementById('login-id').value.trim();
        if(!idInput) return alert("Please supply your In-Game ID.");

        let { data: player } = await _supabase.from('players').select('*').eq('player_id', parseInt(idInput)).single();
        if (!player) return alert("Player ID not recognized in system configuration roster.");

        this.currentUser = player;
        localStorage.setItem('alliance_matrix_player_id', idInput);

        document.getElementById('login-panel').classList.add('hidden');
        document.getElementById('global-logout-btn').classList.remove('hidden');
        document.getElementById('app-workspace').classList.remove('hidden');

        this.renderProfileSectionValues();

        if (player.access_level === 'admin') {
            document.getElementById('admin-control-cockpit').classList.remove('hidden');
            let { data: roster } = await _supabase.from('players').select('*');
            this.allPlayers = roster || [];
            this.handleAdminTemplatePopulate();
        }

        await this.loadOperationsNavigationList();
    }

    logout() {
        this.currentUser = null;
        this.isEditingProfile = false;
        this.currentFocusedEvent = null;
        this.currentFocusedUserResponse = null;
        this.currentEventOverviewData = [];
        localStorage.removeItem('alliance_matrix_player_id');
        document.getElementById('login-id').value = '';
        document.getElementById('app-workspace').classList.add('hidden');
        document.getElementById('global-logout-btn').classList.add('hidden');
        document.getElementById('login-panel').classList.remove('hidden');
        document.getElementById('focused-event-workspace-root').innerHTML = '';
    }

    renderProfileSectionValues() {
        if (!this.currentUser) return;
        
        document.getElementById('display-player-id').innerText = this.currentUser.player_id;
        
        if (!this.isEditingProfile) {
            document.getElementById('wrapper-player-name').innerHTML = `<strong id="display-player-name">${this.currentUser.player_name || '--'}</strong>`;
            document.getElementById('wrapper-player-alliance').innerHTML = `<strong id="display-player-alliance">${this.currentUser.current_alliance || 'Unassigned'}</strong>`;
            
            document.getElementById('profile-city').disabled = true;
            document.getElementById('profile-inf').disabled = true;
            document.getElementById('profile-cav').disabled = true;
            document.getElementById('profile-arch').disabled = true;
            
            document.getElementById('profile-action-btn').innerText = "Edit Profile";
            document.getElementById('profile-action-btn').className = "btn btn-secondary";
        } else {
            document.getElementById('wrapper-player-name').innerHTML = `<input type="text" id="edit-player-name" value="${this.currentUser.player_name || ''}" style="padding:5px 8px; font-size:13px;">`;
            document.getElementById('wrapper-player-alliance').innerHTML = `<input type="text" id="edit-player-alliance" value="${this.currentUser.current_alliance || ''}" placeholder="e.g., Zen" style="padding:5px 8px; font-size:13px;">`;
            
            document.getElementById('profile-city').disabled = false;
            document.getElementById('profile-inf').disabled = false;
            document.getElementById('profile-cav').disabled = false;
            document.getElementById('profile-arch').disabled = false;
            
            document.getElementById('profile-action-btn').innerText = "Save Changes";
            document.getElementById('profile-action-btn').className = "btn";
        }

        document.getElementById('profile-city').value = this.currentUser.city_level || "TG5";
        document.getElementById('profile-inf').value = this.currentUser.infantry_tier || "TG10";
        document.getElementById('profile-cav').value = this.currentUser.cavalry_tier || "TG10";
        document.getElementById('profile-arch').value = this.currentUser.archer_tier || "TG10";
    }

    async toggleProfileEditMode() {
        if (!this.isEditingProfile) {
            this.isEditingProfile = true;
            this.renderProfileSectionValues();
        } else {
            const targetName = document.getElementById('edit-player-name').value.trim();
            const targetAlliance = document.getElementById('edit-player-alliance').value.trim();
            
            if(!targetName) return alert("Player Name cannot be completely blank.");

            const updatedFields = {
                player_name: targetName,
                current_alliance: targetAlliance,
                city_level: document.getElementById('profile-city').value,
                infantry_tier: document.getElementById('profile-inf').value,
                cavalry_tier: document.getElementById('profile-cav').value,
                archer_tier: document.getElementById('profile-arch').value
            };

            const { error } = await _supabase.from('players').update(updatedFields).eq('player_id', parseInt(this.currentUser.player_id));
            
            if (error) {
                alert("Database transmission error sync aborted: " + error.message);
                return;
            }

            this.currentUser = { ...this.currentUser, ...updatedFields };
            this.isEditingProfile = false;
            this.renderProfileSectionValues();
            
            alert("Your military profile has been updated and synchronized!");
        }
    }

    async loadOperationsNavigationList() {
        // Pulls both active and closed relevant structural operations sequentially
        let { data: events, error } = await _supabase.from('events').select('*').order('created_at', { ascending: false });
        if (error) {
            console.error(error);
            return;
        }
        this.eventsList = events || [];

        const targetNav = document.getElementById('event-navigation-list');
        if (this.eventsList.length === 0) {
            targetNav.innerHTML = `<div style="color:var(--text-muted); text-align:center; padding:10px;">No operational directives configured.</div>`;
            return;
        }

        targetNav.innerHTML = this.eventsList.map(ev => {
            const statusBadge = ev.is_active ? `<span class="badge" style="background:#10b981;">Active</span>` : `<span class="badge" style="background:#64748b;">Closed</span>`;
            return `
            <div class="event-action-item">
                <div>
                    <strong style="font-size:14px; margin-right:8px;">${ev.event_title}</strong> 
                    ${statusBadge}
                    <span style="font-size:11px; margin-left:10px; color:var(--text-muted);">[Type: ${ev.event_type.replace('_', ' ')}]</span>
                </div>
                <button class="btn btn-secondary" onclick="app.loadFocusedEventWorkspace('${ev.event_id}')">View for ${ev.event_title}</button>
            </div>`;
        }).join('');
    }

    async loadFocusedEventWorkspace(eventId) {
        const ev = this.eventsList.find(e => e.event_id === eventId);
        if(!ev) return;

        this.currentFocusedEvent = ev;
        this.currentMatrixTab = 1;

        // On-demand payload pull: queries exactly against composite fields event_id + player_id
        let { data: participation, error } = await _supabase
            .from('event_participations')
            .select('*')
            .eq('event_id', eventId)
            .eq('player_id', parseInt(this.currentUser.player_id))
            .maybeSingle();

        if (error) {
            console.error("Payload pull failed:", error);
            alert("Error querying deployment profile data.");
            return;
        }

        if (participation && participation.player_responses && typeof participation.player_responses === 'string') {
            try { participation.player_responses = JSON.parse(participation.player_responses); } catch(e) { console.error(e); }
        }
        this.currentFocusedUserResponse = participation ? participation.player_responses : null;

        const root = document.getElementById('focused-event-workspace-root');
        const isAdmin = this.currentUser.access_level === 'admin';
        
        // Form controls are naturally disabled if the operation execution parameter is closed
        const disableAttr = ev.is_active ? '' : 'disabled';
        const submitBtnStyle = ev.is_active ? '' : 'style="display:none;"';

        root.innerHTML = `
        <div class="event-container" id="workspace-block-${ev.event_id}">
            <div class="event-container-title">
                <span>⚔️ CURRENT OPERATION: ${ev.event_title}</span>
                <span class="badge badge-admin">${ev.event_type.replace('_', ' ').toUpperCase()}</span>
            </div>

            <div class="panel" style="background:#0f1317; margin-bottom:15px;">
                <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; font-weight:bold; margin-bottom:5px;">Mission Directives</div>
                <div style="white-space:pre-wrap; font-size:13px; color:#cbd5e1;">${ev.strategy_text || 'No directives logged.'}</div>
            </div>

            <div class="panel" style="background:#1e293b; border-color:#475569;">
                <div class="panel-title">
                    <span>Registration Submission Form</span>
                </div>
                <form onsubmit="app.handleFormSubmit(event)">
                    <fieldset ${disableAttr} style="border:none; padding:0; margin:0;">
                        <div id="form-inner-slots"></div>
                        <button type="submit" class="btn" ${submitBtnStyle} style="margin-top:15px;">Save Changes</button>
                    </fieldset>
                </form>
            </div>

            <!-- Event Sign Up Overview: ONLY VISIBLE TO ADMIN USERS -->
            <div class="panel ${isAdmin ? '' : 'hidden'}" style="border:1px solid var(--accent-orange);">
                <div class="panel-title" style="color:var(--accent-orange);">📊 Event sign up overview</div>
                <button class="btn" style="background:var(--accent-orange); margin-bottom:15px;" onclick="app.displayLatestOverviewUpdate()">Display the latest update</button>
                
                <div id="tabs-row-overview" class="tabs hidden">
                    <div class="tab" id="tab-opt-1" onclick="app.switchOverviewTab(1)">Day 1: Build</div>
                    <div class="tab" id="tab-opt-2" onclick="app.switchOverviewTab(2)">Day 2: Research</div>
                    <div class="tab" id="tab-opt-3" onclick="app.switchOverviewTab(3)">Day 3: Cooking</div>
                </div>
                <div id="summary-overview" class="summary-bar hidden"></div>
                
                <div class="table-wrapper">
                    <table>
                        <thead><tr id="th-overview"><th>Player Name</th></tr></thead>
                        <tbody id="tb-overview"></tbody>
                    </table>
                </div>
                <button id="bulk-save-overview-btn" class="btn hidden" style="margin-top:15px; background:#2e3b4e; border:1px solid var(--accent-orange);" onclick="app.saveBulkCombatAssignments()">Lock R4 Matrix Assignments</button>
            </div>
        </div>`;

        this.buildInnerFormMarkup(ev.event_type);
        this.populateFormFieldsFromMemory(ev.event_type);
        
        // Auto Scroll viewport focus safely to workspace section smoothly
        document.getElementById(`workspace-block-${ev.event_id}`).scrollIntoView({ behavior: 'smooth' });
    }

    buildInnerFormMarkup(type) {
        const target = document.getElementById('form-inner-slots');
        if(type === 'kvk_prep') {
            target.innerHTML = `
            <div style="margin-bottom:15px; border-left:3px solid #3b82f6; padding-left:10px;">
                <label style="color:#3b82f6;">Request Chief Minister Title Day 1 (+10% Build)?</label>
                <div class="toggle-group">
                    <div class="toggle-btn" id="t-d1-y" onclick="app.setFormToggleUi('d1',true)">YES</div>
                    <div class="toggle-btn" id="t-d1-n" onclick="app.setFormToggleUi('d1',false)">NO</div>
                </div>
                <div id="fields-d1" class="hidden">
                    <label style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">Select Target Hours Window:</label>
                    <div class="checkbox-grid" id="grid-d1" style="margin-bottom:10px;"></div>
                    <input type="number" id="input-d1-speeds" placeholder="Construction Speedups (Whole Days)" style="margin-bottom:5px;">
                    <input type="number" id="input-d1-gold" placeholder="True Gold Value" style="margin-bottom:5px;">
                    <input type="number" id="input-d1-tempered" placeholder="Tempered Gold Count">
                </div>
            </div>
            <div style="margin-bottom:15px; border-left:3px solid #a855f7; padding-left:10px;">
                <label style="color:#a855f7;">Request Chief Minister Title Day 2 (+10% Tech)?</label>
                <div class="toggle-group">
                    <div class="toggle-btn" id="t-d2-y" onclick="app.setFormToggleUi('d2',true)">YES</div>
                    <div class="toggle-btn" id="t-d2-n" onclick="app.setFormToggleUi('d2',false)">NO</div>
                </div>
                <div id="fields-d2" class="hidden">
                    <label style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">Select Target Hours Window:</label>
                    <div class="checkbox-grid" id="grid-d2" style="margin-bottom:10px;"></div>
                    <input type="number" id="input-d2-speeds" placeholder="Research Speedups (Whole Days)" style="margin-bottom:5px;">
                    <input type="number" id="input-d2-dust" placeholder="True Gold Dust Quantity">
                </div>
            </div>
            <div style="margin-bottom:15px; border-left:3px solid #10b981; padding-left:10px;">
                <label style="color:#10b981;">Request Noble Advisor Title Day 3 (+50% Cook)?</label>
                <div class="toggle-group">
                    <div class="toggle-btn" id="t-d3-y" onclick="app.setFormToggleUi('d3',true)">YES</div>
                    <div class="toggle-btn" id="t-d3-n" onclick="app.setFormToggleUi('d3',false)">NO</div>
                </div>
                <div id="fields-d3" class="hidden">
                    <label style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">Select Target Hours Window:</label>
                    <div class="checkbox-grid" id="grid-d3" style="margin-bottom:10px;"></div>
                    <input type="number" id="input-d3-speeds" placeholder="Training Speedups (Whole Days)">
                </div>
            </div>`;
            
            ['d1','d2','d3'].forEach(day => {
                const grid = document.getElementById(`grid-${day}`);
                if (grid) {
                    grid.innerHTML = TIME_SLOTS.map((slot, i) => `
                        <div class="checkbox-item">
                            <input type="checkbox" id="chk-${day}-${i}" value="${slot}">
                            <span>${slot}</span>
                        </div>`).join('');
                }
            });
            ['d1','d2','d3'].forEach(day => this.setFormToggleUi(day, false));
        } else {
            target.innerHTML = `
            <div class="form-group">
                <label>Select Deployment Window Parameters:</label>
                <div class="toggle-group">
                    <div class="toggle-btn" id="bt-need" onclick="app.setCombatStatusUi('needed')">As long as needed</div>
                    <div class="toggle-btn" id="bt-cant" onclick="app.setCombatStatusUi('cannot')">Cannot Plan</div>
                </div>
            </div>
            <div class="form-group">
                <label>Specific Time Restrictions / Custom Hours Text Description:</label>
                <textarea id="input-custom-text" placeholder="Specify availability windows in UTC if restricted..."></textarea>
            </div>`;
            this.setCombatStatusUi('needed');
        }
    }

    setFormToggleUi(day, val) {
        const yesBtn = document.getElementById(`t-${day}-y`);
        const noBtn = document.getElementById(`t-${day}-n`);
        const fieldsDiv = document.getElementById(`fields-${day}`);
        
        if(yesBtn) { if(val) yesBtn.classList.add('active'); else yesBtn.classList.remove('active'); }
        if(noBtn) { if(!val) noBtn.classList.add('active'); else noBtn.classList.remove('active'); }
        if(fieldsDiv) fieldsDiv.className = val ? '' : 'hidden';
    }

    setCombatStatusUi(status) {
        const needBtn = document.getElementById(`bt-need`);
        const cantBtn = document.getElementById(`bt-cant`);
        if(needBtn) { if(status === 'needed') needBtn.classList.add('active'); else needBtn.classList.remove('active'); }
        if(cantBtn) { if(status === 'cannot') cantBtn.classList.add('active'); else cantBtn.classList.remove('active'); }
    }

    populateFormFieldsFromMemory(type) {
        let res = this.currentFocusedUserResponse;
        if(!res) return;

        if(type === 'kvk_prep') {
            if(res.d1_opt_in) {
                this.setFormToggleUi('d1', true);
                if(document.getElementById(`input-d1-speeds`)) document.getElementById(`input-d1-speeds`).value = res.d1_speeds ?? '';
                if(document.getElementById(`input-d1-gold`)) document.getElementById(`input-d1-gold`).value = res.d1_gold ?? '';
                if(document.getElementById(`input-d1-tempered`)) document.getElementById(`input-d1-tempered`).value = res.d1_tempered ?? '';

                TIME_SLOTS.forEach((slot, i) => { 
                    const chk = document.getElementById(`chk-d1-${i}`);
                    if(chk) chk.checked = !!(res.d1_slots && res.d1_slots.includes(slot));
                });
            }
            if(res.d2_opt_in) {
                this.setFormToggleUi('d2', true);
                if(document.getElementById(`input-d2-speeds`)) document.getElementById(`input-d2-speeds`).value = res.d2_speeds ?? '';
                if(document.getElementById(`input-d2-dust`)) document.getElementById(`input-d2-dust`).value = res.d2_dust ?? '';

                TIME_SLOTS.forEach((slot, i) => { 
                    const chk = document.getElementById(`chk-d2-${i}`);
                    if(chk) chk.checked = !!(res.d2_slots && res.d2_slots.includes(slot));
                });
            }
            if(res.d3_opt_in) {
                this.setFormToggleUi('d3', true);
                if(document.getElementById(`input-d3-speeds`)) document.getElementById(`input-d3-speeds`).value = res.d3_speeds ?? '';

                TIME_SLOTS.forEach((slot, i) => { 
                    const chk = document.getElementById(`chk-d3-${i}`);
                    if(chk) chk.checked = !!(res.d3_slots && res.d3_slots.includes(slot));
                });
            }
        } else {
            this.setCombatStatusUi(res.combat_status || 'needed');
            const ct = document.getElementById(`input-custom-text`);
            if(ct) ct.value = res.custom_hours || '';
        }
    }

    async handleFormSubmit(e) {
        e.preventDefault();
        if(!this.currentFocusedEvent) return;

        const eventId = this.currentFocusedEvent.event_id;
        const type = this.currentFocusedEvent.event_type;
        let responses = {};

        if(type === 'kvk_prep') {
            const d1Active = document.getElementById(`t-d1-y`)?.classList.contains('active');
            const d2Active = document.getElementById(`t-d2-y`)?.classList.contains('active');
            const d3Active = document.getElementById(`t-d3-y`)?.classList.contains('active');

            if(d1Active) {
                responses.d1_opt_in = true;
                responses.d1_speeds = parseInt(document.getElementById(`input-d1-speeds`).value) || 0;
                responses.d1_gold = parseInt(document.getElementById(`input-d1-gold`).value) || 0;
                responses.d1_tempered = parseInt(document.getElementById(`input-d1-tempered`).value) || 0;
                responses.d1_slots = [];
                TIME_SLOTS.forEach((slot, i) => { if(document.getElementById(`chk-d1-${i}`)?.checked) responses.d1_slots.push(slot); });
            }
            if(d2Active) {
                responses.d2_opt_in = true;
                responses.d2_speeds = parseInt(document.getElementById(`input-d2-speeds`).value) || 0;
                responses.d2_dust = parseInt(document.getElementById(`input-d2-dust`).value) || 0;
                responses.d2_slots = [];
                TIME_SLOTS.forEach((slot, i) => { if(document.getElementById(`chk-d2-${i}`)?.checked) responses.d2_slots.push(slot); });
            }
            if(d3Active) {
                responses.d3_opt_in = true;
                responses.d3_speeds = parseInt(document.getElementById(`input-d3-speeds`).value) || 0;
                responses.d3_slots = [];
                TIME_SLOTS.forEach((slot, i) => { if(document.getElementById(`chk-d3-${i}`)?.checked) responses.d3_slots.push(slot); });
            }
        } else {
            const cantActive = document.getElementById(`bt-cant`)?.classList.contains('active');
            responses.combat_status = cantActive ? 'cannot' : 'needed';
            responses.custom_hours = document.getElementById(`input-custom-text`)?.value.trim() || '';
        }

        // 🛡️ Safe Verification Lookup bypassing missing "id" auto key via structural composite mapping fields
        const { data: databaseCheck, error: fetchErr } = await _supabase
            .from('event_participations')
            .select('event_id, player_id')
            .eq('event_id', eventId)
            .eq('player_id', parseInt(this.currentUser.player_id))
            .maybeSingle();

        if (fetchErr) {
            console.error("Fetch verification lookup error:", fetchErr);
            return alert("Verification verification error: " + fetchErr.message);
        }

        let syncError = null;

        if (databaseCheck) {
            // Document matched securely, perform targeted update targeting composite values
            const { error: updateError } = await _supabase
                .from('event_participations')
                .update({
                    player_responses: responses,
                    updated_at: new Date().toISOString()
                })
                .eq('event_id', eventId)
                .eq('player_id', parseInt(this.currentUser.player_id));
            syncError = updateError;
        } else {
            // New record mapping registration entry required
            const { error: insertError } = await _supabase
                .from('event_participations')
                .insert({
                    event_id: eventId,
                    player_id: parseInt(this.currentUser.player_id),
                    player_responses: responses,
                    updated_at: new Date().toISOString()
                });
            syncError = insertError;
        }

        if(syncError) {
            console.error("Database Synchronization Failure:", syncError);
            alert("Database Error: " + syncError.message);
            return;
        }

        alert("Operation status modifications safely recorded!");
        this.currentFocusedUserResponse = responses;
    }

    // --- ADMINISTRATIVE SIGN UP OVERVIEW SUITE CONTROLS ---

    async displayLatestOverviewUpdate() {
        if (!this.currentFocusedEvent) return;
        const eventId = this.currentFocusedEvent.event_id;

        let { data: parts, error } = await _supabase
            .from('event_participations')
            .select('*, players(*)')
            .eq('event_id', eventId);

        if(error) {
            console.error(error);
            return alert("Failed to fetch current matrix overview updates.");
        }

        this.currentEventOverviewData = (parts || []).map(p => {
            if (p.player_responses && typeof p.player_responses === 'string') {
                try { p.player_responses = JSON.parse(p.player_responses); } catch(e) { console.error(e); }
            }
            return p;
        });

        this.drawOverviewGrid();
    }

    switchOverviewTab(dayNum) {
        this.currentMatrixTab = dayNum;
        this.drawOverviewGrid();
    }

    drawOverviewGrid() {
        const type = this.currentFocusedEvent.event_type;
        const th = document.getElementById('th-overview');
        const tb = document.getElementById('tb-overview');
        const banner = document.getElementById('summary-overview');
        const tabRow = document.getElementById('tabs-row-overview');
        
        if (type === 'kvk_prep') {
            if(tabRow) tabRow.classList.remove('hidden');
            if(banner) banner.classList.remove('hidden');

            [1, 2, 3].forEach(d => {
                const tabEl = document.getElementById(`tab-opt-${d}`);
                if(tabEl) tabEl.className = `tab ${d === this.currentMatrixTab ? 'active' : ''}`;
            });

            let activeTitleRequests = 0, aggregateSpeeds = 0, resourceAgg = 0;
            this.currentEventOverviewData.forEach(p => {
                let r = p.player_responses || {};
                if(this.currentMatrixTab === 1 && r.d1_opt_in) { activeTitleRequests++; aggregateSpeeds += (r.d1_speeds || 0); resourceAgg += (r.d1_gold || 0); }
                if(this.currentMatrixTab === 2 && r.d2_opt_in) { activeTitleRequests++; aggregateSpeeds += (r.d2_speeds || 0); resourceAgg += (r.d2_dust || 0); }
                if(this.currentMatrixTab === 3 && r.d3_opt_in) { activeTitleRequests++; aggregateSpeeds += (r.d3_speeds || 0); }
            });

            if(banner) {
                if(this.currentMatrixTab === 1) banner.innerHTML = `<strong>Day 1 Summary:</strong> ${activeTitleRequests} Title Requests | Construction Speedups: ${aggregateSpeeds}d | Total True Gold: ${resourceAgg}`;
                if(this.currentMatrixTab === 2) banner.innerHTML = `<strong>Day 2 Summary:</strong> ${activeTitleRequests} Title Requests | Research Speedups: ${aggregateSpeeds}d | Total Dust Assets: ${resourceAgg}`;
                if(this.currentMatrixTab === 3) banner.innerHTML = `<strong>Day 3 Summary:</strong> ${activeTitleRequests} Title Requests | Training Speeds: ${aggregateSpeeds}d`;
            }

            if(th) th.innerHTML = `<th>Player Name</th><th>Alliance Tag</th><th>Profile Stats</th><th>Title Opt-In</th><th>Requested Target Slots</th><th>Resource Metrics</th>`;
            if(tb) {
                tb.innerHTML = this.currentEventOverviewData.map(p => {
                    let r = p.player_responses || {};
                    const user = p.players || { player_name: 'Unknown User' };
                    const pStr = `${user.city_level || '--'}/${user.infantry_tier || '--'}/${user.cavalry_tier || '--'}/${user.archer_tier || '--'}`;
                    
                    let valOpt = "❌ No";
                    let valSlots = "--";
                    let valRes = "--";
                    if(this.currentMatrixTab === 1 && r.d1_opt_in) { valOpt = "✅ Yes"; valSlots = r.d1_slots?.join(', ') || ''; valRes = `🏗️ ${r.d1_speeds}d Speeds / ${r.d1_gold} Gold / ${r.d1_tempered} Temp`; }
                    if(this.currentMatrixTab === 2 && r.d2_opt_in) { valOpt = "✅ Yes"; valSlots = r.d2_slots?.join(', ') || ''; valRes = `🔬 ${r.d2_speeds}d Speeds / ${r.d2_dust} Dust`; }
                    if(this.currentMatrixTab === 3 && r.d3_opt_in) { valOpt = "✅ Yes"; valSlots = r.d3_slots?.join(', ') || ''; valRes = `⚔️ ${r.d3_speeds}d Training`; }

                    return `<tr><td><strong>${user.player_name}</strong></td><td><span class="badge" style="background:#232d37; color:var(--accent-orange);">${user.current_alliance || '--'}</span></td><td><span class="badge">${pStr}</span></td><td>${valOpt}</td><td style="font-size:11px; max-width:180px; overflow:hidden; text-overflow:ellipsis;">${valSlots}</td><td>${valRes}</td></tr>`;
                }).join('');
            }
        } else {
            if(tabRow) tabRow.classList.add('hidden');
            if(banner) banner.classList.add('hidden');
            
            const bulkBtn = document.getElementById(`bulk-save-overview-btn`);
            if(bulkBtn) bulkBtn.classList.remove('hidden');
            if(th) th.innerHTML = `<th>Player Name</th><th>Alliance Tag</th><th>Profile Stats</th><th>Availability Status Output</th><th>R4 Strategic Deployment Matrix Tags</th>`;
            
            if(tb) {
                tb.innerHTML = this.currentEventOverviewData.map((p, idx) => {
                    let r = p.player_responses || {};
                    const a = p.r4_assignments || { battle_alliance: '', combat_role: 'Joiner' };
                    const user = p.players || { player_name: 'Unknown' };
                    const pStr = `${user.city_level || '--'}/${user.infantry_tier || '--'}/${user.cavalry_tier || '--'}/${user.archer_tier || '--'}`;
                    
                    let avStr = r.combat_status === 'cannot' ? '❌ Cannot Plan' : '✅ As long as needed';
                    if(r.custom_hours) avStr += ` <div style="color:var(--text-muted); font-style:italic; font-size:11px;">"${r.custom_hours}"</div>`;

                    return `
                    <tr>
                        <td><strong>${user.player_name}</strong></td>
                        <td><span class="badge" style="background:#232d37; color:var(--accent-orange);">${user.current_alliance || '--'}</span></td>
                        <td><span class="badge">${pStr}</span></td>
                        <td>${avStr}</td>
                        <td>
                            <input type="text" id="assign-all-${idx}" value="${a.battle_alliance || ''}" placeholder="Alliance Tag" style="width:90px; padding:4px; font-size:11px; display:inline-block;">
                            <select id="assign-role-${idx}" style="width:90px; padding:4px; font-size:11px; display:inline-block;">
                                <option value="Rally Lead" ${a.combat_role === 'Rally Lead' ? 'selected' : ''}>Rally Lead</option>
                                <option value="Joiner" ${a.combat_role === 'Joiner' ? 'selected' : ''}>Joiner</option>
                                <option value="Reserve" ${a.combat_role === 'Reserve' ? 'selected' : ''}>Reserve</option>
                            </select>
                            <input type="hidden" id="assign-pid-${idx}" value="${p.player_id}">
                        </td>
                    </tr>`;
                }).join('');
            }
        }
    }

    async saveBulkCombatAssignments() {
        if(!this.currentFocusedEvent) return;
        const eventId = this.currentFocusedEvent.event_id;
        let idx = 0;
        
        while(document.getElementById(`assign-pid-${idx}`)) {
            const pId = parseInt(document.getElementById(`assign-pid-${idx}`).value);
            const bAll = document.getElementById(`assign-all-${idx}`).value.trim();
            const cRole = document.getElementById(`assign-role-${idx}`).value;

            await _supabase.from('event_participations').update({
                r4_assignments: { battle_alliance: bAll, combat_role: cRole }
            }).eq('event_id', eventId).eq('player_id', pId);
            
            idx++;
        }
        alert("Combat tactical assignments synchronized successfully!");
        await this.displayLatestOverviewUpdate();
    }

    handleAdminTemplatePopulate() {
        const type = document.getElementById('adm-type').value;
        const baseTemplates = {
            kvk_prep: "## 🏗️ KVK PREPARATION PHASE\n• Complete target resource declarations inside forms below.",
            kvk_battle: "## ⚔️ KVK COMBAT OPERATIONS\n• Track real-time roster war alliances assignments mapped below."
        };
        document.getElementById('adm-strategy').value = baseTemplates[type];
    }

    async launchNewOperation() {
        const title = document.getElementById('adm-title').value.trim();
        const type = document.getElementById('adm-type').value;
        const strategy = document.getElementById('adm-strategy').value;

        if(!title) return alert("Operation title required.");

        await _supabase.from('events').insert({
            event_title: title,
            event_type: type,
            strategy_text: strategy,
            is_active: true
        });

        alert("New Operation Launched Successfully!");
        document.getElementById('adm-title').value = '';
        await this.loadOperationsNavigationList();
    }
}

const app = new AppConfig();
window.onload = () => app.init();
</script>
