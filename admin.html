<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>171 Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1d29; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #242838; padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        h1, h2, h3 { color: #e0e0e0; }
        h1 { border-bottom: 2px solid #4a5a7a; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #b0b8c8; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #3a4055; border-radius: 4px; background: #2d3142; color: #e0e0e0; }
        .btn { background-color: #3b82f6; color: #fff; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #2563eb; }
        .btn-secondary { background-color: #4b5563; }
        .btn-secondary:hover { background-color: #374151; }
        .btn-success { background-color: #059669; }
        .btn-success:hover { background-color: #047857; }
        .btn-warning { background-color: #d97706; }
        .btn-warning:hover { background-color: #b45309; }
        .hidden { display: none !important; }
        .admin-section { margin-bottom: 30px; padding: 15px; border: 1px solid #3a4055; border-radius: 4px; background: #2d3142; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #3a4055; padding: 8px; text-align: left; }
        th { background-color: #1e212e; color: #b0b8c8; }
        td { color: #d0d4dc; }
        .event-action-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #2d3142; border: 1px solid #3a4055; margin-bottom: 8px; border-radius: 4px; }
        .login-panel-dark { max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #3a4055; border-radius: 4px; background: #242838; }
        .login-panel-dark h3 { color: #e0e0e0; }
        .login-panel-dark label { color: #b0b8c8; }
        .header-link { font-size: 13px; color: #60a5fa; text-decoration: none; }
        .header-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>171 Admin Portal</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a href="index.html" class="header-link">← Player View</a>
            <button id="global-logout-btn" class="btn btn-secondary hidden" onclick="app.logout()">Log Out</button>
        </div>
    </header>

    <!-- Login -->
    <div id="login-panel" class="login-panel-dark">
        <h3>Admin Login</h3>
        <div class="form-group">
            <label for="login-id">Player ID:</label>
            <input type="number" id="login-id" placeholder="Enter your Player ID">
        </div>
        <button class="btn" style="width: 100%;" onclick="app.login()">Login</button>
    </div>

    <!-- Admin Workspace -->
    <div id="app-workspace" class="hidden">

        <!-- Manage events -->
        <div class="admin-section">
            <h2>Manage events</h2>
            <button class="btn" id="admin-init-create-btn" onclick="app.showAdminCreateForm()">Create events</button>
            <div id="admin-create-form-wrapper" class="hidden" style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #3a4055;">
                <div class="form-group"><label>Event Title</label><input type="text" id="adm-title"></div>
                <div class="form-group"><label>Event Type</label><select id="adm-type" onchange="app.handleAdminTemplatePopulate()"><option value="kvk_prep">KVK Preparation</option><option value="kvk_battle">KVK Battle</option><option value="tyrant_battle">Tyrant Battle</option></select></div>
                <div class="form-group"><label>Strategy Text</label><textarea id="adm-strategy"></textarea></div>
                <button class="btn" onclick="app.launchNewOperation()">Submit New Event</button>
                <button class="btn btn-secondary" onclick="app.hideAdminCreateForm()">Cancel</button>
            </div>
            <div id="admin-event-list" style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #3a4055;"></div>
            <div id="admin-signup-display" style="margin-top: 20px;"></div>
        </div>

    </div>
</div>

<script src="shared.js"></script>
<script>
class AdminConfig extends AppConfig {

    // --- Hook overrides ---

    async onLoginSuccess() {
        if (this.currentUser.access_level !== 'admin') {
            alert("Admin access required. Redirecting to player portal.");
            window.location.href = 'index.html';
            return;
        }
        this.handleAdminTemplatePopulate();
    }

    onLogoutCleanup() {
        this.hideAdminCreateForm();
        this.closeSignupDisplay();
    }

    async onEventsLoaded() {
        this.renderAdminEventList();
    }


    // --- Admin: create event ---

    showAdminCreateForm() {
        document.getElementById('admin-create-form-wrapper').classList.remove('hidden');
        document.getElementById('admin-init-create-btn').classList.add('hidden');
    }

    hideAdminCreateForm() {
        const wrapper = document.getElementById('admin-create-form-wrapper');
        if (!wrapper) return;
        wrapper.classList.add('hidden');
        document.getElementById('admin-init-create-btn').classList.remove('hidden');
        document.getElementById('adm-title').value = '';
        document.getElementById('adm-strategy').value = '';
    }

    handleAdminTemplatePopulate() {
        const typeEl = document.getElementById('adm-type');
        if (!typeEl) return;
        const type = typeEl.value;
        const baseTemplates = {
            kvk_prep: "KVK PREPARATION PHASE\n• Complete target declarations below.",
            kvk_battle: "KVK COMBAT OPERATIONS\n• Track war alliance configurations below.",
            tyrant_battle: "TYRANT BATTLE\n• Deploy forces and coordinate attacks below."
        };
        document.getElementById('adm-strategy').value = baseTemplates[type];
    }

    async launchNewOperation() {
        const title = document.getElementById('adm-title').value.trim();
        const type = document.getElementById('adm-type').value;
        const strategy = document.getElementById('adm-strategy').value;
        if (!title) return alert("Event title required.");
        await _supabase.from('events').insert({ event_title: title, event_type: type, strategy_text: strategy, is_active: true });
        alert("New Event Created!");
        this.hideAdminCreateForm();
        await this.loadEvents();
    }


    // --- Admin: event list with toggle ---

    renderAdminEventList() {
        const target = document.getElementById('admin-event-list');
        if (!target) return;
        if (this.eventsList.length === 0) {
            target.innerHTML = '<p style="color:#888; text-align:center;">No events created yet.</p>';
            return;
        }
        target.innerHTML = this.eventsList.map(ev => {
            const statusLabel = ev.is_active
                ? '<span style="color:#34d399; font-weight:bold;">[Active]</span>'
                : '<span style="color:#9ca3af;">[Closed]</span>';
            const toggleBtn = ev.is_active
                ? '<button class="btn btn-warning" onclick="app.toggleEventStatus(\'' + ev.event_id + '\', false)">Close Event</button>'
                : '<button class="btn btn-success" onclick="app.toggleEventStatus(\'' + ev.event_id + '\', true)">Activate Event</button>';
            const signupBtn = '<button class="btn btn-secondary" style="margin-left:5px;" onclick="app.viewLatestSignup(\'' + ev.event_id + '\')">View latest sign up</button>';
            return '<div class="event-action-item"><div><strong style="color:#e0e0e0;">' + ev.event_title + '</strong> ' + statusLabel + '<div style="font-size:11px; color:#888; margin-top:3px;">Type: ' + ev.event_type + '</div></div><div style="display:flex; gap:5px;">' + toggleBtn + signupBtn + '</div></div>';
        }).join('');
    }

    async toggleEventStatus(eventId, newStatus) {
        const { error } = await _supabase.from('events')
            .update({ is_active: newStatus }).eq('event_id', eventId);
        if (error) return alert("Failed to update event status: " + error.message);
        await this.loadEvents();
    }


    // --- Admin: view latest sign up table ---

    async viewLatestSignup(eventId) {
        const ev = this.eventsList.find(e => e.event_id === eventId);
        if (!ev) return;

        let parts;
        try { parts = await this.fetchParticipationsWithPlayers(eventId); }
        catch (error) { return alert("Failed to fetch sign up records: " + error.message); }

        const display = document.getElementById('admin-signup-display');
        if (parts.length === 0) {
            display.innerHTML = '<h3>Latest sign up: ' + ev.event_title + '</h3><p style="color:#888; text-align:center;">No players have submitted a form for this event yet.</p><button class="btn btn-secondary" onclick="app.closeSignupDisplay()">Close</button>';
            display.scrollIntoView({ behavior: 'smooth' });
            return;
        }

        const type = ev.event_type;
        const rows = parts.map(p => {
            const r = p.player_responses || {};
            const user = p.players || { player_name: 'Unknown', player_id: p.player_id };
            const pStr = (user.city_level || '--') + '/' + (user.infantry_tier || '--') + '/' + (user.cavalry_tier || '--') + '/' + (user.archer_tier || '--');
            let details = '';
            if (type === 'kvk_prep') {
                const lines = [];
                lines.push('Day 1 (Build): ' + (r.d1_opt_in ? '✅ Yes' : '❌ No'));
                if (r.d1_opt_in) lines.push('&nbsp;&nbsp;Speeds: ' + (r.d1_speeds || 0) + 'd | Gold: ' + (r.d1_gold || 0) + ' | Tempered: ' + (r.d1_tempered || 0) + ' | Slots: ' + (r.d1_slots || []).length);
                lines.push('Day 2 (Research): ' + (r.d2_opt_in ? '✅ Yes' : '❌ No'));
                if (r.d2_opt_in) lines.push('&nbsp;&nbsp;Speeds: ' + (r.d2_speeds || 0) + 'd | Dust: ' + (r.d2_dust || 0) + ' | Slots: ' + (r.d2_slots || []).length);
                lines.push('Day 3 (Cooking): ' + (r.d3_opt_in ? '✅ Yes' : '❌ No'));
                if (r.d3_opt_in) lines.push('&nbsp;&nbsp;Speeds: ' + (r.d3_speeds || 0) + 'd | Slots: ' + (r.d3_slots || []).length);
                details = lines.join('<br>');
            } else if (type === 'tyrant_battle') {
                const lines = [];
                lines.push('Status: ' + (r.combat_status === 'cannot' ? '❌ Cannot Plan' : '✅ As long as needed'));
                if (r.custom_hours) lines.push('Notes: "' + r.custom_hours + '"');
                details = lines.join('<br>');
            } else {
                const lines = [];
                lines.push('Status: ' + (r.combat_status === 'cannot' ? '❌ Cannot Plan' : '✅ As long as needed'));
                if (r.custom_hours) lines.push('Notes: "' + r.custom_hours + '"');
                details = lines.join('<br>');
            }
            const updated = p.updated_at ? new Date(p.updated_at).toLocaleString() : '--';
            return '<tr><td><strong style="color:#e0e0e0;">' + (user.player_name || 'Unknown') + '</strong></td><td>' + (user.player_id || p.player_id) + '</td><td>' + (user.current_alliance || '--') + '</td><td>' + pStr + '</td><td style="font-size:12px;">' + details + '</td><td style="font-size:11px; color:#888;">' + updated + '</td></tr>';
        }).join('');

        display.innerHTML = '<h3>Latest sign up: ' + ev.event_title + '</h3><p style="font-size:13px; color:#888; margin-bottom:10px;">' + parts.length + ' player(s) have submitted a form.</p><table><thead><tr><th>Player Name</th><th>Player ID</th><th>Alliance</th><th>Profile Stats</th><th>Submitted Details</th><th>Submitted At</th></tr></thead><tbody>' + rows + '</tbody></table><button class="btn btn-secondary" style="margin-top:15px;" onclick="app.closeSignupDisplay()">Close</button>';
        display.scrollIntoView({ behavior: 'smooth' });
    }

    closeSignupDisplay() {
        const display = document.getElementById('admin-signup-display');
        if (display) display.innerHTML = '';
    }
}

const app = new AdminConfig();
window.onload = () => app.init();
</script>
</body>
</html>
